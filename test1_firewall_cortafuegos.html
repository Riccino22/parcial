
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Firewall / Cortafuegos</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel-2: #273449; --text: #e2e8f0;
    --muted: #94a3b8; --accent: #38bdf8; --accent-2: #0ea5e9;
    --ok: #22c55e; --err: #ef4444; --warn: #f59e0b; --border: #334155;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
  header { padding:16px 24px; background:var(--panel); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
  header h1 { margin:0 0 6px 0; font-size:18px; color:var(--accent); }
  .topbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; }
  .stats { font-size:14px; color:var(--muted); } .stats b { color:var(--text); }
  main { max-width:920px; margin:24px auto; padding:0 16px 80px; }
  .controls { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  button { background:var(--panel); color:var(--text); border:1px solid var(--border); padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px; transition:background .15s,border-color .15s; }
  button:hover { background:var(--panel-2); }
  button.primary { background:var(--accent-2); border-color:var(--accent-2); color:white; font-weight:600; }
  button.primary:hover { background:var(--accent); }
  button.danger { background:transparent; border-color:var(--err); color:var(--err); }
  select { background:var(--panel); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:8px; font-size:14px; }
  .question { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:16px; }
  .question h3 { margin:0 0 8px 0; font-size:15px; color:var(--muted); font-weight:500; }
  .question .prompt { font-size:15px; margin-bottom:12px; }
  .options { display:flex; flex-direction:column; gap:8px; }
  .opt { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1px solid var(--border); background:var(--panel-2); border-radius:8px; cursor:pointer; transition:background .15s,border-color .15s; }
  .opt:hover { background:#2f3e57; }
  .opt input { margin-top:3px; accent-color:var(--accent); }
  .opt .letter { font-weight:bold; color:var(--accent); min-width:18px; }
  .opt.correct { background:rgba(34,197,94,.15); border-color:var(--ok); }
  .opt.incorrect { background:rgba(239,68,68,.15); border-color:var(--err); }
  .feedback { margin-top:12px; padding:10px 12px; border-radius:8px; font-size:14px; display:none; }
  .feedback.show { display:block; }
  .feedback.ok { background:rgba(34,197,94,.1); border:1px solid var(--ok); color:#bbf7d0; }
  .feedback.err { background:rgba(239,68,68,.1); border:1px solid var(--err); color:#fecaca; }
  .section-divider { margin:28px 0 14px; padding:10px 14px; background:linear-gradient(90deg,var(--accent-2),transparent); border-radius:8px; font-weight:600; color:white; }
  .progress-bar { height:6px; background:var(--panel-2); border-radius:3px; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; background:var(--accent); transition:width .3s; }
  #result { background:var(--panel); border:2px solid var(--accent); border-radius:12px; padding:24px; margin-bottom:20px; display:none; }
  #result.show { display:block; } #result h2 { margin-top:0; color:var(--accent); }
  .score-big { font-size:42px; font-weight:bold; }
  .score-level { font-size:18px; margin-top:8px; }
  .level-elite { color:var(--ok); } .level-good { color:var(--accent); } .level-mid { color:var(--warn); } .level-bad { color:var(--err); }
  .by-section { margin-top:16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
  .sec-card { background:var(--panel-2); padding:10px 12px; border-radius:8px; border:1px solid var(--border); font-size:14px; }
  .sec-card .sec-name { color:var(--muted); font-size:12px; } .sec-card .sec-score { font-size:18px; font-weight:bold; margin-top:4px; }
  footer { text-align:center; color:var(--muted); font-size:12px; padding:16px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; margin-left:6px; }
  .badge-ok { background:var(--ok); color:white; } .badge-err { background:var(--err); color:white; } .badge-pending { background:var(--muted); color:white; }
  @media (max-width:600px) { .topbar { flex-direction:column; align-items:flex-start; } main { padding:0 10px 60px; } .question { padding:14px; } }
</style>
</head>
<body>
<header>
  <h1>🔥 Test de Práctica — Firewall / Cortafuegos</h1>
  <div class="topbar">
    <div class="stats">Respondidas: <b id="answered">0</b> / <b id="total">50</b> · Correctas: <b id="correct" style="color:var(--ok)">0</b> · Incorrectas: <b id="wrong" style="color:var(--err)">0</b></div>
    <div>
      <select id="filter"><option value="all">Todas las secciones</option></select>
      <button id="btnSubmit" class="primary">Calificar</button>
      <button id="btnReset" class="danger">Reiniciar</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</header>
<main>
  <div id="result"></div>
  <div class="controls">
    <button id="btnInstant">Modo instantáneo: <b id="instantState">OFF</b></button>
    <button id="btnShuffle">Mezclar preguntas</button>
    <button id="btnOnlyWrong">Mostrar solo erradas</button>
    <button id="btnAll">Mostrar todas</button>
  </div>
  <div id="quiz"></div>
</main>
<footer>Test de Práctica — Firewall / Cortafuegos · Suerte 🍀</footer>
<script>
const SECTIONS = {
  1:"🔥 Parte 1 — Definición y Objetivos",
  2:"🛡️ Parte 2 — Políticas de Diseño",
  3:"⚡ Parte 3 — Beneficios y Limitaciones",
  4:"⚙️ Parte 4 — Cómo Funciona",
  5:"🔧 Parte 5 — Tipos e iptables"
};
const QUESTIONS = [
  {n:1,s:1,q:"Un Firewall es un sistema ubicado entre dos redes que ejerce:",opts:["Una política de seguridad establecida","Una política de respaldo automático","Un control del acceso físico al edificio","Un cifrado permanente de los datos"],a:0,e:"Un Firewall es el mecanismo encargado de proteger una red confiable de una que no lo es, ejerciendo una política de seguridad."},
  {n:2,s:1,q:"¿Cuál es el PRIMER objetivo de diseño de un firewall?",opts:["Que solo el tráfico autorizado sea permitido","Que todo el tráfico de la red sea cifrado","Que todo el tráfico pase a través de él","Que se detecte a los intrusos internos"],a:2,e:"El primer objetivo es que todo el tráfico (en ambos sentidos) pase por él. El segundo es que solo el tráfico autorizado sea permitido."},
  {n:3,s:1,q:"Un firewall SIRVE para:",opts:["Defensa perimetral de la red","Cifrar los archivos del servidor","Detectar y eliminar virus","Hacer copias de seguridad"],a:0,e:"El firewall sirve para la defensa perimetral de la red."},
  {n:4,s:1,q:"Un firewall NO SIRVE para:",opts:["Controlar el tráfico entrante y saliente","Defender ataques que vienen del interior","Definir las políticas de acceso","Filtrar paquetes según su protocolo"],a:1,e:"El firewall no defiende ataques o errores que provienen del interior, ni protege una vez que el intruso lo traspasa."},
  {n:5,s:1,q:"Los sistemas operativos actuales abren puertos sin notificar, dejando los puertos:",opts:["Abiertos y expuestos a un uso no autorizado","Protegidos de forma automática por el SO","Cerrados hasta que el usuario los habilite","Cifrados mientras no haya conexión activa"],a:0,e:"Los SO abren puertos por defecto sin avisar, dejándolos expuestos a uso no autorizado."},
  {n:6,s:1,q:"¿En qué momento exacto entra en juego el cortafuegos?",opts:["Cuando se descarga un archivo de Internet","Cuando se instala un programa nuevo","Cuando el equipo se enciende e inicia","Cuando se intenta establecer una conexión"],a:3,e:"El cortafuegos interviene cuando se intenta establecer una conexión, poniéndose delante de los puertos."},
  {n:7,s:1,q:"Según su formato, los cortafuegos pueden ser:",opts:["Personales, de subred y perimetrales","Activos, pasivos y reactivos","Locales, remotos y distribuidos","Hardware, software y firmware"],a:0,e:"Los formatos son: 1) Personales, 2) De subred, 3) Redes perimetrales."},
  {n:8,s:1,q:"Según su forma física, los firewalls pueden ser:",opts:["Físicos, de software y mixtos","Activos, reactivos y combinados","Locales, remotos y en la nube","Internos, externos y perimetrales"],a:0,e:"Los firewalls pueden ser físicos (hardware), de software o mixtos."},
  {n:9,s:1,q:"¿Qué debe proteger un firewall según las políticas de diseño?",opts:["Únicamente los datos en tránsito","Solamente el servidor principal","Todos los elementos de la red interna","Solo las contraseñas de usuarios"],a:2,e:"Debe proteger todos los elementos de la red interna: hardware, software, datos, etc."},
  {n:10,s:1,q:"¿De quién protege principalmente un firewall?",opts:["De cualquier acceso no autorizado externo","Solo de los ataques internos de la red","Únicamente de los virus y el malware","Solo de la denegación de servicio (DoS)"],a:0,e:"El firewall protege de cualquier intento de acceso no autorizado desde el exterior."},
  {n:11,s:2,q:"El paradigma de seguridad más usado en firewalls es:",opts:["Se prohíbe todo salvo lo expresamente permitido","Se permite todo salvo lo expresamente prohibido","Se permite todo el tráfico y se registra","Se prohíbe todo el tráfico sin excepción"],a:0,e:"El paradigma más utilizado es: se prohíbe todo excepto lo expresamente permitido."},
  {n:12,s:2,q:"La estrategia de seguridad 'Paranoica' implica:",opts:["Se controla todo y no se permite nada","Se controla y se conoce todo lo que sucede","Se controla pero se permite demasiado","No se controla nada y se permite todo"],a:0,e:"Paranoica: se controla todo, no se permite nada."},
  {n:13,s:2,q:"La estrategia de seguridad 'Prudente' implica:",opts:["Se controla todo y no se permite nada","Se controla y se conoce todo lo que sucede","Se controla pero se permite demasiado","No se controla nada y se permite todo"],a:1,e:"Prudente: se controla y se conoce todo lo que sucede."},
  {n:14,s:2,q:"La estrategia de seguridad 'Permisiva' implica:",opts:["Se controla todo y no se permite nada","Se controla y se conoce todo lo que sucede","Se controla pero se permite demasiado","No se controla nada y se permite todo"],a:2,e:"Permisiva: se controla pero se permite demasiado."},
  {n:15,s:2,q:"La estrategia de seguridad 'Promiscua' implica:",opts:["Se controla todo y no se permite nada","Se controla y se conoce todo lo que sucede","Se controla pero se permite demasiado","No se controla nada y se permite todo"],a:3,e:"Promiscua: no se controla (o muy poco) y se permite todo."},
  {n:16,s:2,q:"Los usuarios 'Trusted' en un firewall son:",opts:["Administradores con control total del sistema","Usuarios externos con acceso permanente","Usuarios internos con acceso a servicios externos","Usuarios anónimos y sin ninguna restricción"],a:2,e:"Los Trusted son usuarios internos que, cuando provengan del interior, pueden acceder a ciertos servicios externos definidos."},
  {n:17,s:2,q:"Las cuentas de usuarios externos con permiso de entrada deben:",opts:["Permanecer siempre activas y disponibles","Activarse y desactivarse solo bajo demanda","Tener acceso permanente pero auditado","Borrarse de forma automática cada día"],a:1,e:"Es conveniente que estas cuentas se activen y desactiven bajo demanda y únicamente el tiempo necesario."},
  {n:18,s:2,q:"Al diseñar un firewall IPFW, ¿dónde se realiza el mayor esfuerzo en creación de reglas?",opts:["En la cadena de entrada de la interfaz externa","En la cadena de salida de la interfaz interna","En la cadena de reenvío entre interfaces","En la tabla de traducción de direcciones"],a:0,e:"El mayor esfuerzo se realiza en la cadena de entrada de la interfaz externa."},
  {n:19,s:3,q:"La mayor limitación de un firewall es:",opts:["Su elevado costo de adquisición","Su lentitud para filtrar los paquetes","El hueco no tapado que el intruso descubre","La necesidad de reiniciarlo seguido"],a:2,e:"La limitación más grande es el hueco que no se tapa y que el intruso descubre con su ingenio."},
  {n:20,s:3,q:"Los firewalls son sistemas inteligentes que aprenden y se adaptan solos:",opts:["Verdadero, usan inteligencia artificial","Verdadero, se adaptan solos al tráfico","Falso, no ejecutan ninguna acción automática","Falso, solo actúan según parámetros del diseñador"],a:3,e:"Los firewalls NO son inteligentes: actúan según parámetros del diseñador; si un paquete no está contemplado, lo deja pasar."},
  {n:21,s:3,q:"Un intruso que deja 'Back Doors' después de entrar puede:",opts:["Ser detectado de inmediato por el firewall","Ser bloqueado en su siguiente intento","Ser registrado y expulsado en forma automática","Abrir otros huecos y borrar las pruebas"],a:3,e:"El intruso puede dejar Back Doors, abrir un hueco diferente y borrar las pruebas del ataque original."},
  {n:22,s:3,q:"El firewall 'NO es contra humanos' significa que:",opts:["No puede detectar los virus en archivos","Si alguien entra físicamente y roba claves, no se entera","No es capaz de filtrar el contenido de la web","No puede bloquear las conexiones remotas"],a:1,e:"Si un intruso accede físicamente y descubre passwords o huecos del firewall, este no lo detectará."},
  {n:23,s:3,q:"Un firewall NO protege de:",opts:["Los accesos no autorizados externos","El tráfico sospechoso entrante","La gente que está dentro de la red interna","Los intentos de intrusión perimetral"],a:2,e:"Un firewall es vulnerable; no protege de la gente dentro de la red interna. Conviene complementarlo con defensa interna."},
  {n:24,s:3,q:"¿Para qué es el firewall el punto ideal?",opts:["Para reemplazar al antivirus corporativo","Para almacenar las copias de configuración","Para repartir la carga de tráfico de la red","Para monitorear la seguridad y alertar de ataques"],a:3,e:"El Firewall es el punto ideal para monitorear la seguridad de la red y generar alarmas de intentos de ataque."},
  {n:25,s:3,q:"El uso del firewall se volvió imperativo también porque:",opts:["Porque reemplaza al servidor DNS interno","Las intranets salen a Internet por un traductor en él","Porque aumenta el ancho de banda disponible","Porque puede sustituir al servidor web"],a:1,e:"La crisis de IPs hizo que las intranets adopten IPs sin clase que salen a Internet mediante un traductor de direcciones en el Firewall."},
  {n:26,s:3,q:"¿Para qué sirve el firewall en relación al ancho de banda?",opts:["Aumenta el ancho de banda contratado","Comprime el tráfico para ahorrar ancho de banda","Lleva estadísticas de consumo para restringir procesos","Garantiza una velocidad mínima a cada servicio"],a:2,e:"El Firewall lleva estadísticas del ancho de banda consumido, permitiendo al administrador restringir procesos."},
  {n:27,s:3,q:"Otro uso de los firewalls es:",opts:["Servir como servidor de archivos principal","Reemplazar al servidor DNS de la red","Gestionar las cuentas de usuario del dominio","Dividir zonas con distinta seguridad o alojar www y ftp"],a:3,e:"Los Firewalls también pueden dividir partes de un sitio con distintas necesidades de seguridad o albergar servicios www y ftp."},
  {n:28,s:3,q:"El firewall NO provee herramientas contra:",opts:["Los accesos no autorizados externos","El filtrado de contenido web sospechoso","Los archivos o software infectados con virus","El monitoreo del tráfico de la red"],a:2,e:"El Firewall no protege contra archivos o software infectados, aunque se puede dotar de antivirus a la máquina donde reside."},
  {n:29,s:4,q:"Las políticas de firewall emplean IPs para:",opts:["Asignar IPs dinámicas a los usuarios","Traducir IPs privadas a públicas en forma automática","Registrar el historial de navegación del usuario","Suspender peticiones externas y ocultar recursos internos"],a:3,e:"Las políticas emplean IPs para suspender peticiones externas no autorizadas, disfrazando los recursos internos tras una IP propia."},
  {n:30,s:4,q:"El filtrado de contenido en un firewall:",opts:["Solo bloquea virus y malware ya conocidos","Distingue el contenido problemático del permitido","Analiza el comportamiento de las apps instaladas","Funciona únicamente con el tráfico HTTP"],a:1,e:"El filtrado de contenido distingue, con reglas de exclusión, los contenidos problemáticos de los que el usuario puede decidir."},
  {n:31,s:4,q:"DPI (Deep Package Inspection) añade:",opts:["Una capa de cifrado sobre los paquetes","Una segunda capa que revisa el contenido del paquete","Mayor velocidad al procesar los paquetes","Compresión de datos para ahorrar ancho de banda"],a:1,e:"DPI (Inspección Profunda de Paquetes) añade una segunda capa de seguridad, revisando el contenido profundo del paquete."},
  {n:32,s:4,q:"El cortafuego de 'nivel de aplicación de pasarela' se usa para:",opts:["Todo tipo de tráfico que circula por la red","Aplicaciones riesgosas como FTP o P2P","Únicamente el tráfico HTTP y HTTPS","La gestión de las direcciones IP de la red"],a:1,e:"El nivel de aplicación de pasarela se usa para aplicaciones riesgosas (FTP, P2P). Es muy eficaz pero consume recursos."},
  {n:33,s:4,q:"El 'circuito a nivel de pasarela' vigila:",opts:["El contenido interno de los paquetes de datos","Las direcciones IP y MAC de los equipos","Las conexiones TCP o UDP mediante sesiones","Las aplicaciones instaladas en los equipos"],a:2,e:"El circuito a nivel de pasarela vigila la gestión de conexiones TCP o UDP a través de sesiones de seguridad."},
  {n:34,s:4,q:"El cortafuego de capa de red trabaja en base a:",opts:["La inspección de IPs y paquetes, con datos como la MAC","El análisis del contenido de la aplicación","Las sesiones de usuario ya autenticadas","Únicamente los puertos TCP y UDP"],a:0,e:"El cortafuego de capa de red inspecciona direcciones IP e intercambio de paquetes, empleando datos alternos como la MAC."},
  {n:35,s:4,q:"La diferencia entre 'Rechazo' y 'Denegación' en un IPFW es:",opts:["No hay diferencia, son términos sinónimos","Rechazo bloquea y Denegación permite con aviso","Rechazo responde al emisor; Denegación no responde","Rechazo es permanente y Denegación es temporal"],a:2,e:"Rechazo: envía respuesta negativa al emisor. Denegación: descarta sin responder (el atacante no sabe si la máquina existe)."},
  {n:36,s:4,q:"En iptables, los argumentos ACCEPT, REJECT y DROP corresponden respectivamente a:",opts:["Permitir, bloquear y registrar","Aceptación, rechazo y denegación","Entrada, salida y reenvío","Filtrar, traducir y alterar"],a:1,e:"En iptables: ACCEPT = aceptación, REJECT = rechazo (envía respuesta), DROP = denegación (no envía respuesta)."},
  {n:37,s:4,q:"Las listas de reglas de un IPFW se llaman:",opts:["Tablas","Políticas","Cadenas (chains)","Filtros"],a:2,e:"Las distintas listas de reglas se llaman cadenas (chains); la de entrada es independiente de la de salida."},
  {n:38,s:4,q:"En iptables, las tres tablas principales son:",opts:["INPUT, OUTPUT, FORWARD","ACCEPT, REJECT, DROP","TCP, UDP, ICMP","FILTER, NAT, MANGLE"],a:3,e:"Iptables consiste en tres tablas: FILTER (filtrado), NAT (masquerading) y MANGLE (alterar estado de paquetes)."},
  {n:39,s:5,q:"La tabla FILTER de iptables se usa para:",opts:["Hacer NAT o masquerading","Alterar el estado de paquetes críticos","Gestionar las interfaces de red","Implementar el firewall y filtrar paquetes"],a:3,e:"La tabla FILTER es la usada para implementar el firewall; aquí se produce el filtrado de paquetes."},
  {n:40,s:5,q:"La tabla NAT de iptables sirve para:",opts:["Que otros equipos salgan usando nuestra IP","Filtrar los paquetes según su protocolo","Registrar los eventos de seguridad","Controlar el estado de las conexiones"],a:0,e:"La tabla NAT sirve para masquerading: que otros equipos se conecten a servicios usando nuestra IP."},
  {n:41,s:5,q:"La tabla MANGLE de iptables sirve para:",opts:["Alterar el estado de un paquete","El filtrado básico de los paquetes","La traducción de las direcciones IP","Gestionar las sesiones de usuario"],a:0,e:"La tabla MANGLE sirve para alterar el estado de un paquete; se usa solo en casos críticos."},
  {n:42,s:5,q:"En la tabla FILTER, la regla FORWARDING se usa para:",opts:["Filtrar todo el tráfico entrante","Filtrar todo el tráfico saliente","Enrutar tráfico que pasa hacia otro equipo","Alterar los paquetes antes de salir"],a:2,e:"FORWARDING: enruta tráfico a través de nuestro equipo hacia otro; se supone que ese tráfico no es para nosotros."},
  {n:43,s:5,q:"En iptables, el flag -F significa:",opts:["Forward, reenviar el paquete","Filter, filtrar el paquete","Fail, descartar por error","Flush, borrar las reglas"],a:3,e:"iptables -F (flush): borra todas las reglas de la cadena."},
  {n:44,s:5,q:"En iptables, el flag -A significa:",opts:["Append, añade una regla al final de la cadena","Accept, acepta el paquete","Alter, altera el paquete","Address, especifica una dirección"],a:0,e:"iptables -A (append): añade una regla; ojo, se agrega al final de la cadena."},
  {n:45,s:5,q:"En una regla iptables, --dport es:",opts:["El puerto de destino","La dirección IP de destino","El protocolo de destino","El modo de descarte del paquete"],a:0,e:"--dport especifica el puerto de destino en la regla iptables."},
  {n:46,s:5,q:"En iptables, -j ACCEPT indica:",opts:["Registrar el paquete en el log","Rechazar el paquete con respuesta","Descartar el paquete sin avisar","Aceptar el paquete y dejarlo pasar"],a:3,e:"-j indica el destino del paquete; ACCEPT lo acepta. También puede ser DROP, LOG o REJECT."},
  {n:47,s:5,q:"El estado RELATED en ipt_conntrack es para:",opts:["Paquetes nuevos e independientes entre sí","Paquetes de una conexión ya establecida","Paquetes nuevos ligados a una conexión existente","Paquetes inválidos o desconocidos"],a:2,e:"RELATED: paquetes nuevos pero relacionados con una conexión existente, como las conexiones de datos en FTP."},
  {n:48,s:5,q:"Para guardar las reglas iptables de forma permanente se ejecuta:",opts:["iptables -save all","iptables --persist rules","save-iptables /etc/rules","/etc/init.d/iptables save"],a:3,e:"/etc/init.d/iptables save guarda las reglas actualmente cargadas como reglas por defecto."},
  {n:49,s:5,q:"Para ver las reglas iptables actualmente activas se usa:",opts:["iptables -F","iptables -L","iptables -show","iptables -view"],a:1,e:"iptables -L muestra el contenido de cada tabla y sus respectivos chains."},
  {n:50,s:5,q:"Para usar iptables, el kernel Linux debe ser superior a la versión:",opts:["2.0.0","2.3.15","3.0.0","Cualquier versión es válida"],a:1,e:"Para utilizar iptables se necesita un kernel superior a la versión 2.3.15, recompilado con las opciones necesarias."}
];
let answers={}, instantMode=false, displayList=[...QUESTIONS], onlyWrongView=false, graded=false;
function letter(i){return["a","b","c","d"][i];}
function renderFilter(){
  const sel=document.getElementById("filter");
  Object.entries(SECTIONS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v;sel.appendChild(o);});
  sel.addEventListener("change",render);
}
function render(){
  const quiz=document.getElementById("quiz"); quiz.innerHTML="";
  const filter=document.getElementById("filter").value;
  let currentSection=null;
  let toShow=displayList.filter(q=>filter==="all"||String(q.s)===filter);
  if(onlyWrongView&&graded) toShow=toShow.filter(q=>answers[q.n]!==undefined&&answers[q.n]!==q.a);
  toShow.forEach(qd=>{
    if(qd.s!==currentSection&&filter==="all"){
      const div=document.createElement("div"); div.className="section-divider"; div.textContent=SECTIONS[qd.s]; quiz.appendChild(div); currentSection=qd.s;
    }
    const card=document.createElement("div"); card.className="question"; card.id="q"+qd.n;
    const h3=document.createElement("h3");
    const status=answers[qd.n]===undefined?'<span class="badge badge-pending">Sin responder</span>':(graded||instantMode)?(answers[qd.n]===qd.a?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>'):'<span class="badge badge-pending">Respondida</span>';
    h3.innerHTML=`Pregunta ${qd.n} ${status}`; card.appendChild(h3);
    const prompt=document.createElement("div"); prompt.className="prompt"; prompt.textContent=qd.q; card.appendChild(prompt);
    const opts=document.createElement("div"); opts.className="options";
    qd.opts.forEach((txt,idx)=>{
      const lbl=document.createElement("label"); lbl.className="opt";
      const radio=document.createElement("input"); radio.type="radio"; radio.name="q"+qd.n; radio.value=idx;
      if(answers[qd.n]===idx) radio.checked=true;
      radio.addEventListener("change",()=>{answers[qd.n]=idx; if(instantMode)showFeedback(qd.n); updateStats(); renderItemMarks(qd);});
      const letterSpan=document.createElement("span"); letterSpan.className="letter"; letterSpan.textContent=letter(idx)+")";
      const text=document.createElement("span"); text.textContent=txt;
      lbl.appendChild(radio); lbl.appendChild(letterSpan); lbl.appendChild(text); opts.appendChild(lbl);
    });
    card.appendChild(opts);
    const fb=document.createElement("div"); fb.className="feedback"; fb.id="fb"+qd.n; card.appendChild(fb);
    quiz.appendChild(card);
    if(graded||(instantMode&&answers[qd.n]!==undefined)){renderItemMarks(qd); if(answers[qd.n]!==undefined)showFeedback(qd.n);}
  });
  if(toShow.length===0) quiz.innerHTML='<div class="question" style="text-align:center;color:var(--muted)">No hay preguntas para mostrar.</div>';
  updateStats();
}
function renderItemMarks(qd){
  if(!graded&&!instantMode) return; if(answers[qd.n]===undefined) return;
  const card=document.getElementById("q"+qd.n); if(!card) return;
  card.querySelectorAll(".opt").forEach((lbl,idx)=>{lbl.classList.remove("correct","incorrect"); if(idx===qd.a)lbl.classList.add("correct"); else if(idx===answers[qd.n])lbl.classList.add("incorrect");});
  const h3=card.querySelector("h3"); const isOk=answers[qd.n]===qd.a;
  h3.innerHTML=`Pregunta ${qd.n} `+(isOk?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>');
}
function showFeedback(n){
  const qd=QUESTIONS.find(q=>q.n===n); const fb=document.getElementById("fb"+n); if(!fb) return;
  const isOk=answers[n]===qd.a;
  fb.className="feedback show "+(isOk?"ok":"err");
  fb.innerHTML=isOk?`✅ <b>Correcto.</b> ${qd.e}`:`❌ <b>Incorrecto.</b> Respuesta: <b>${letter(qd.a)})</b> ${qd.opts[qd.a]}. ${qd.e}`;
}
function updateStats(){
  const answered=Object.keys(answers).length;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  document.getElementById("answered").textContent=answered;
  document.getElementById("correct").textContent=correct;
  document.getElementById("wrong").textContent=answered-correct;
  document.getElementById("progress").style.width=(answered/QUESTIONS.length*100)+"%";
}
function grade(){
  graded=true;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  const total=QUESTIONS.length; const pct=Math.round(correct/total*100);
  let level,cls;
  if(correct>=45){level="Excelente. Dominás el tema del Firewall. 🚀";cls="level-elite";}
  else if(correct>=38){level="Bien. Repasá los que fallaste. 💪";cls="level-good";}
  else if(correct>=28){level="Justo. Repasá las secciones débiles. 📚";cls="level-mid";}
  else{level="Volvé a estudiar el material. Foco en tipos y limitaciones. 🔥";cls="level-bad";}
  const bySection={};
  Object.keys(SECTIONS).forEach(s=>bySection[s]={ok:0,total:0});
  QUESTIONS.forEach(q=>{bySection[q.s].total++;if(answers[q.n]===q.a)bySection[q.s].ok++;});
  const secHtml=Object.entries(SECTIONS).map(([k,v])=>{const sd=bySection[k];const sPct=Math.round(sd.ok/sd.total*100);return`<div class="sec-card"><div class="sec-name">${v}</div><div class="sec-score">${sd.ok}/${sd.total} <span style="color:var(--muted);font-size:13px;font-weight:normal">(${sPct}%)</span></div></div>`;}).join("");
  const res=document.getElementById("result"); res.classList.add("show");
  res.innerHTML=`<h2>📊 Resultado</h2><div class="score-big">${correct} / ${total} <span style="font-size:24px;color:var(--muted)">(${pct}%)</span></div><div class="score-level ${cls}">${level}</div><div class="by-section">${secHtml}</div><div style="margin-top:14px;color:var(--muted);font-size:14px">Las correctas en verde, las erradas en rojo, con explicación.</div>`;
  res.scrollIntoView({behavior:"smooth"}); render();
}
function reset(){
  if(!confirm("¿Reiniciar el test? Vas a perder las respuestas.")) return;
  answers={}; graded=false; onlyWrongView=false;
  document.getElementById("result").classList.remove("show");
  displayList=[...QUESTIONS]; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function shuffle(){
  if(graded){if(!confirm("Esto va a reiniciar tus respuestas. ¿Continuar?"))return;answers={};graded=false;}
  for(let i=displayList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[displayList[i],displayList[j]]=[displayList[j],displayList[i]];}
  render();
}
document.getElementById("btnSubmit").addEventListener("click",grade);
document.getElementById("btnReset").addEventListener("click",reset);
document.getElementById("btnShuffle").addEventListener("click",shuffle);
document.getElementById("btnInstant").addEventListener("click",()=>{instantMode=!instantMode;document.getElementById("instantState").textContent=instantMode?"ON":"OFF";render();});
document.getElementById("btnOnlyWrong").addEventListener("click",()=>{if(!graded){alert("Primero calificá el test.");return;}onlyWrongView=true;render();});
document.getElementById("btnAll").addEventListener("click",()=>{onlyWrongView=false;render();});
document.getElementById("total").textContent=QUESTIONS.length;
renderFilter(); render();
</script>
</body>
</html>
