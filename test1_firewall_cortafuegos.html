<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Firewall / Cortafuegos</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel-2: #273449; --text: #e2e8f0;
    --muted: #94a3b8; --accent: #38bdf8; --accent-2: #0ea5e9;
    --ok: #22c55e; --err: #ef4444; --warn: #f59e0b; --border: #334155;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
  header { padding:16px 24px; background:var(--panel); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
  header h1 { margin:0 0 6px 0; font-size:18px; color:var(--accent); }
  .topbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; }
  .stats { font-size:14px; color:var(--muted); } .stats b { color:var(--text); }
  main { max-width:920px; margin:24px auto; padding:0 16px 80px; }
  .controls { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  button { background:var(--panel); color:var(--text); border:1px solid var(--border); padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px; transition:background .15s,border-color .15s; }
  button:hover { background:var(--panel-2); }
  button.primary { background:var(--accent-2); border-color:var(--accent-2); color:white; font-weight:600; }
  button.primary:hover { background:var(--accent); }
  button.danger { background:transparent; border-color:var(--err); color:var(--err); }
  select { background:var(--panel); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:8px; font-size:14px; }
  .question { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:16px; }
  .question h3 { margin:0 0 8px 0; font-size:15px; color:var(--muted); font-weight:500; }
  .question .prompt { font-size:15px; margin-bottom:12px; }
  .options { display:flex; flex-direction:column; gap:8px; }
  .opt { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1px solid var(--border); background:var(--panel-2); border-radius:8px; cursor:pointer; transition:background .15s,border-color .15s; }
  .opt:hover { background:#2f3e57; }
  .opt input { margin-top:3px; accent-color:var(--accent); }
  .opt .letter { font-weight:bold; color:var(--accent); min-width:18px; }
  .opt.correct { background:rgba(34,197,94,.15); border-color:var(--ok); }
  .opt.incorrect { background:rgba(239,68,68,.15); border-color:var(--err); }
  .feedback { margin-top:12px; padding:10px 12px; border-radius:8px; font-size:14px; display:none; }
  .feedback.show { display:block; }
  .feedback.ok { background:rgba(34,197,94,.1); border:1px solid var(--ok); color:#bbf7d0; }
  .feedback.err { background:rgba(239,68,68,.1); border:1px solid var(--err); color:#fecaca; }
  .section-divider { margin:28px 0 14px; padding:10px 14px; background:linear-gradient(90deg,var(--accent-2),transparent); border-radius:8px; font-weight:600; color:white; }
  .progress-bar { height:6px; background:var(--panel-2); border-radius:3px; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; background:var(--accent); transition:width .3s; }
  #result { background:var(--panel); border:2px solid var(--accent); border-radius:12px; padding:24px; margin-bottom:20px; display:none; }
  #result.show { display:block; } #result h2 { margin-top:0; color:var(--accent); }
  .score-big { font-size:42px; font-weight:bold; }
  .score-level { font-size:18px; margin-top:8px; }
  .level-elite { color:var(--ok); } .level-good { color:var(--accent); } .level-mid { color:var(--warn); } .level-bad { color:var(--err); }
  .by-section { margin-top:16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
  .sec-card { background:var(--panel-2); padding:10px 12px; border-radius:8px; border:1px solid var(--border); font-size:14px; }
  .sec-card .sec-name { color:var(--muted); font-size:12px; } .sec-card .sec-score { font-size:18px; font-weight:bold; margin-top:4px; }
  footer { text-align:center; color:var(--muted); font-size:12px; padding:16px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; margin-left:6px; }
  .badge-ok { background:var(--ok); color:white; } .badge-err { background:var(--err); color:white; } .badge-pending { background:var(--muted); color:white; }
  @media (max-width:600px) { .topbar { flex-direction:column; align-items:flex-start; } main { padding:0 10px 60px; } .question { padding:14px; } }
</style>
</head>
<body>
<header>
  <h1>🔥 Test de Práctica — Firewall / Cortafuegos</h1>
  <div class="topbar">
    <div class="stats">Respondidas: <b id="answered">0</b> / <b id="total">50</b> · Correctas: <b id="correct" style="color:var(--ok)">0</b> · Incorrectas: <b id="wrong" style="color:var(--err)">0</b></div>
    <div>
      <select id="filter"><option value="all">Todas las secciones</option></select>
      <button id="btnSubmit" class="primary">Calificar</button>
      <button id="btnReset" class="danger">Reiniciar</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</header>
<main>
  <div id="result"></div>
  <div class="controls">
    <button id="btnInstant">Modo instantáneo: <b id="instantState">OFF</b></button>
    <button id="btnShuffle">Mezclar preguntas</button>
    <button id="btnOnlyWrong">Mostrar solo erradas</button>
    <button id="btnAll">Mostrar todas</button>
  </div>
  <div id="quiz"></div>
</main>
<footer>Test de Práctica — Firewall / Cortafuegos · Suerte 🍀</footer>
<script>
const SECTIONS = {
  1:"🔥 Parte 1 — Definición y Objetivos",
  2:"🛡️ Parte 2 — Políticas de Diseño",
  3:"⚡ Parte 3 — Beneficios y Limitaciones",
  4:"⚙️ Parte 4 — Cómo Funciona",
  5:"🔧 Parte 5 — Tipos e iptables"
};
const QUESTIONS = [
  {n:1,s:1,q:"Un Firewall es un sistema ubicado entre dos redes que ejerce:",opts:["Una política de usuario","Una política de seguridad establecida","Un control de acceso físico","Un sistema de cifrado de datos"],a:1,e:"Un Firewall es el mecanismo encargado de proteger una red confiable de una que no lo es, ejerciendo una política de seguridad."},
  {n:2,s:1,q:"¿Cuál es el PRIMER objetivo de diseño de un firewall?",opts:["Solo el tráfico autorizado es permitido","Cifrar todo el tráfico de red","Todo el tráfico desde dentro hacia fuera y viceversa debe pasar a través de él","Detectar intrusos dentro de la red"],a:2,e:"El primer objetivo es que todo el tráfico pase por él. El segundo objetivo es que solo el tráfico autorizado sea permitido."},
  {n:3,s:1,q:"Un firewall SIRVE para:",opts:["Defender ataques provenientes del interior","Defensa perimetral de las redes","Proteger después de que el intruso lo traspasa","Detectar y eliminar virus en archivos"],a:1,e:"El firewall sirve para defensa perimetral. No defiende ataques del interior ni protege después de ser traspasado."},
  {n:4,s:1,q:"Un firewall NO SIRVE para:",opts:["Controlar el tráfico entrante y saliente","Definir políticas de acceso","No defiende ataques o errores provenientes del interior","Filtrar paquetes según protocolo"],a:2,e:"El firewall no defiende ataques internos ni protege una vez que el intruso lo traspasa."},
  {n:5,s:1,q:"Los sistemas operativos actuales abren puertos sin notificar, dejando los puertos:",opts:["Protegidos automáticamente","Abiertos y expuestos a uso sin consentimiento del usuario","Cerrados por defecto hasta que el usuario los active","Cifrados por el SO"],a:1,e:"Los SO abren puertos por defecto sin avisar, dejándolos expuestos a uso no autorizado."},
  {n:6,s:1,q:"¿En qué momento exacto entra en juego el cortafuegos?",opts:["Cuando se descarga un archivo","Cuando se instala un nuevo programa","Cuando se intenta establecer una conexión","Cuando el equipo se enciende"],a:2,e:"El cortafuegos interviene cuando se intenta establecer una conexión, poniéndose delante de los puertos."},
  {n:7,s:1,q:"Según su formato, los cortafuegos pueden ser:",opts:["Activos, pasivos y mixtos","Personales, de subred y redes perimetrales","Hardware, software y firmware","Locales, remotos y distribuidos"],a:1,e:"Los formatos son: 1) Personales, 2) De subred, 3) Redes perimetrales."},
  {n:8,s:1,q:"Según su forma física, los firewalls pueden ser:",opts:["Activos, reactivos y mixtos","Físicos (digitales), software y mixtos","Locales, remotos y en la nube","Internos, externos y perimetrales"],a:1,e:"Los firewalls pueden ser físicos (hardware), de software o mixtos."},
  {n:9,s:1,q:"¿Qué debe proteger un firewall según las políticas de diseño?",opts:["Solo los datos en tránsito","Solo el servidor principal","Todos los elementos de la red interna: hardware, software, datos, etc.","Solo las contraseñas de usuarios"],a:2,e:"Debe proteger todos los elementos de la red interna: hardware, software, datos, etc."},
  {n:10,s:1,q:"¿De quién protege principalmente un firewall?",opts:["Solo de ataques internos","De cualquier intento de acceso no autorizado desde el exterior","Solo de virus y malware","Solo de ataques de denegación de servicio"],a:1,e:"El firewall protege de cualquier intento de acceso no autorizado desde el exterior."},
  {n:11,s:2,q:"El paradigma de seguridad más usado en firewalls es:",opts:["Se permite cualquier servicio excepto los expresamente prohibidos","Se prohíbe cualquier servicio excepto los expresamente permitidos","Se permite todo y se registra","Se prohíbe todo sin excepción"],a:1,e:"El paradigma más utilizado es: se prohíbe todo excepto lo expresamente permitido."},
  {n:12,s:2,q:"La estrategia de seguridad 'Paranoica' implica:",opts:["Se controla pero se permite demasiado","No se controla y se permite todo","Se controla todo, no se permite nada","Se controla y se conoce todo lo que sucede"],a:2,e:"Paranoica: se controla todo, no se permite nada."},
  {n:13,s:2,q:"La estrategia de seguridad 'Prudente' implica:",opts:["Se controla todo, no se permite nada","Se controla y se conoce todo lo que sucede","Se controla pero se permite demasiado","No se controla y se permite todo"],a:1,e:"Prudente: se controla y se conoce todo lo que sucede."},
  {n:14,s:2,q:"La estrategia de seguridad 'Permisiva' implica:",opts:["Se controla todo, no se permite nada","Se controla y se conoce todo lo que sucede","Se controla pero se permite demasiado","No se controla y se permite todo"],a:2,e:"Permisiva: se controla pero se permite demasiado."},
  {n:15,s:2,q:"La estrategia de seguridad 'Promiscua' implica:",opts:["Se controla todo, no se permite nada","Se controla y se conoce todo lo que sucede","Se controla pero se permite demasiado","No se controla (o se hace poco) y se permite todo"],a:3,e:"Promiscua: no se controla (o muy poco) y se permite todo."},
  {n:16,s:2,q:"Los usuarios 'Trusted' en un firewall son:",opts:["Administradores con acceso total al sistema","Usuarios externos con acceso permanente","Usuarios internos validados que pueden acceder a servicios externos definidos","Usuarios anónimos sin restricciones"],a:2,e:"Los Trusted son usuarios internos que, cuando provengan del interior, pueden acceder a ciertos servicios externos definidos."},
  {n:17,s:2,q:"Las cuentas de usuarios externos con permiso de entrada deben:",opts:["Estar siempre activas para no interrumpir servicios","Activarse y desactivarse bajo demanda, solo el tiempo necesario","Tener acceso permanente pero auditado","Eliminarse automáticamente cada 24 horas"],a:1,e:"Es conveniente que estas cuentas sean activadas y desactivadas bajo demanda y únicamente el tiempo que sean necesarias."},
  {n:18,s:2,q:"Al diseñar un firewall IPFW, ¿dónde se realiza el mayor esfuerzo en creación de reglas?",opts:["La cadena de salida de la interfaz interna","La cadena de entrada de la interfaz externa","La cadena de reenvío (FORWARD)","La tabla NAT"],a:1,e:"El mayor esfuerzo se realiza en la cadena de entrada de la interfaz externa."},
  {n:19,s:3,q:"La mayor limitación de un firewall es:",opts:["Su alto costo de adquisición","El hueco que no se tapa, descubierto por el ingenio del intruso","Su lentitud al filtrar paquetes","La necesidad de reiniciarlo frecuentemente"],a:1,e:"La limitación más grande es el hueco que no se tapa y que el intruso descubre con su ingenio."},
  {n:20,s:3,q:"Los firewalls son sistemas inteligentes que aprenden y se adaptan solos:",opts:["Verdadero, usan inteligencia artificial avanzada","Falso; actúan solo según parámetros introducidos por su diseñador","Verdadero, se adaptan automáticamente al tráfico","Falso; no pueden ejecutar ninguna acción automática"],a:1,e:"Los firewalls NO son sistemas inteligentes. Actúan según parámetros del diseñador; si un paquete no está en esos parámetros, lo deja pasar."},
  {n:21,s:3,q:"Un intruso que deja 'Back Doors' después de entrar puede:",opts:["Ser detectado automáticamente por el firewall","Ser bloqueado en el siguiente intento","Abrir huecos distintos y borrar las pruebas del ataque original","Ser registrado y expulsado automáticamente"],a:2,e:"El intruso puede dejar Back Doors, abrir un hueco diferente y borrar las pruebas del ataque original."},
  {n:22,s:3,q:"El firewall 'NO es contra humanos' significa que:",opts:["No puede detectar virus en archivos","No puede filtrar contenido web","Si un intruso entra físicamente y descubre passwords o huecos, el firewall no se dará cuenta","No puede bloquear conexiones remotas"],a:2,e:"Si un intruso accede físicamente a la organización y descubre passwords o huecos del firewall, el firewall no lo detectará."},
  {n:23,s:3,q:"Un firewall NO protege de:",opts:["Accesos no autorizados desde el exterior","Tráfico sospechoso entrante","La gente que está dentro de la red interna","Intentos de intrusión perimetral"],a:2,e:"Un firewall es vulnerable; no protege de la gente dentro de la red interna. Trabaja mejor complementado con defensa interna."},
  {n:24,s:3,q:"¿Para qué es el firewall el punto ideal?",opts:["Para reemplazar el antivirus corporativo","Para monitorear la seguridad de la red y generar alarmas de intentos de ataque","Para almacenar los backups de configuración","Para balancear la carga de red"],a:1,e:"El Firewall es el punto ideal para monitorear la seguridad de la red y generar alarmas de intentos de ataque."},
  {n:25,s:3,q:"El uso del firewall se volvió imperativo también porque:",opts:["Reemplaza al servidor DNS","Las intranets adoptan IPs sin clase que salen a Internet mediante un traductor en el Firewall","Aumenta el ancho de banda disponible","Puede reemplazar al servidor web"],a:1,e:"La crisis de IPs disponibles hizo que las intranets adopten IPs sin clase que salen a Internet mediante un traductor de direcciones en el Firewall."},
  {n:26,s:3,q:"¿Para qué sirve el firewall en relación al ancho de banda?",opts:["Aumenta automáticamente el ancho de banda contratado","Lleva estadísticas del ancho de banda consumido para que el administrador restrinja procesos","Comprime el tráfico para optimizar el ancho de banda","Garantiza velocidad mínima a servicios críticos"],a:1,e:"El Firewall lleva estadísticas del ancho de banda consumido por el tráfico, permitiendo al administrador restringir procesos."},
  {n:27,s:3,q:"Otro uso de los firewalls es:",opts:["Servir como servidor de archivos principal","Dividir partes de un sitio con distintas necesidades de seguridad o albergar servicios www y ftp","Reemplazar al servidor DNS en la organización","Gestionar las cuentas de usuarios del dominio"],a:1,e:"Los Firewalls también pueden usarse para dividir partes de un sitio con distintas necesidades de seguridad o para albergar servicios www y ftp."},
  {n:28,s:3,q:"El firewall NO provee herramientas contra:",opts:["Accesos no autorizados desde el exterior","Filtrado de contenido web sospechoso","Filtración de software o archivos infectados con virus","Monitoreo del tráfico de red"],a:2,e:"El Firewall no provee herramientas contra filtración de software o archivos infectados, aunque se puede dotar de antivirus a la máquina donde reside."},
  {n:29,s:4,q:"Las políticas de firewall emplean IPs para:",opts:["Asignar IPs dinámicamente a los usuarios","Suspender peticiones que no provengan de la red interna, disfrazando recursos internos detrás de una IP propia","Traducir IPs privadas a públicas automáticamente","Registrar el historial de navegación de usuarios"],a:1,e:"Las políticas de firewall emplean IPs y otros sistemas para suspender peticiones externas no autorizadas, disfrazando los recursos internos."},
  {n:30,s:4,q:"El filtrado de contenido en un firewall:",opts:["Solo bloquea virus y malware conocidos","Distingue contenidos problemáticos de los que quedan a discreción del usuario, pudiendo bloquear webs o servidores","Analiza el comportamiento de las aplicaciones instaladas","Solo funciona con tráfico HTTP"],a:1,e:"El filtrado de contenido usa reglas de exclusión para distinguir contenidos problemáticos o sospechosos de los que el usuario puede decidir."},
  {n:31,s:4,q:"DPI (Deep Package Inspection) añade:",opts:["Una capa de cifrado a los paquetes de datos","Velocidad al procesamiento de paquetes","Una segunda capa de seguridad revisando el contenido profundo de los paquetes recibidos","Compresión de datos para optimizar el ancho de banda"],a:2,e:"DPI (Inspección Profunda de Paquetes) añade una segunda capa de seguridad al sistema, revisando el contenido profundo de los paquetes."},
  {n:32,s:4,q:"El cortafuego de 'nivel de aplicación de pasarela' se usa para:",opts:["Todo tipo de tráfico de red","Aplicaciones específicas consideradas riesgosas como servidores FTP o P2P","Solo tráfico HTTP y HTTPS","Gestión de direcciones IP en la red"],a:1,e:"El nivel de aplicación de pasarela se usa para aplicaciones específicas consideradas riesgosas, como FTP o P2P. Es muy eficaz pero consume recursos."},
  {n:33,s:4,q:"El 'circuito a nivel de pasarela' vigila:",opts:["El contenido de los paquetes de datos","Las direcciones IP y MAC de los dispositivos","La gestión de conexiones TCP o UDP a través de sesiones de seguridad","Las aplicaciones instaladas en los equipos"],a:2,e:"El circuito a nivel de pasarela vigila la gestión de conexiones TCP o UDP a través de sesiones de seguridad."},
  {n:34,s:4,q:"El cortafuego de capa de red trabaja en base a:",opts:["Análisis del contenido de la aplicación","La inspección de las direcciones IP y el intercambio de paquetes, usando datos alternos como la MAC","Las sesiones de usuario autenticadas","Los puertos TCP/UDP únicamente"],a:1,e:"El cortafuego de capa de red trabaja con la inspección de direcciones IP e intercambio de paquetes IP, empleando datos alternos como la dirección MAC."},
  {n:35,s:4,q:"La diferencia entre 'Rechazo' y 'Denegación' en un IPFW es:",opts:["No hay diferencia, son sinónimos","Rechazo bloquea, denegación permite con advertencia","Rechazo envía una respuesta negativa; Denegación no envía ninguna respuesta","Rechazo es permanente; Denegación es temporal"],a:2,e:"Rechazo: envía respuesta negativa al emisor. Denegación: descarta la petición sin enviar ninguna respuesta (el atacante no sabe si la máquina existe)."},
  {n:36,s:4,q:"En iptables, los argumentos ACCEPT, REJECT y DROP corresponden respectivamente a:",opts:["Permitir, bloquear y registrar","Aceptación, rechazo y denegación","Entrada, salida y reenvío","Filtrar, traducir y alterar"],a:1,e:"En iptables: ACCEPT = aceptación, REJECT = rechazo (envía respuesta), DROP = denegación (no envía respuesta)."},
  {n:37,s:4,q:"Las listas de reglas de un IPFW se llaman:",opts:["Tablas","Políticas","Cadenas (chains)","Filtros"],a:2,e:"Las distintas listas de reglas se llaman cadenas (chains). La lista de reglas de entrada es independiente de la de salida."},
  {n:38,s:4,q:"En iptables, las tres tablas principales son:",opts:["INPUT, OUTPUT, FORWARD","ACCEPT, REJECT, DROP","FILTER, NAT, MANGLE","TCP, UDP, ICMP"],a:2,e:"Los Iptables consisten en tres tablas: FILTER (filtrado de paquetes), NAT (masquerading) y MANGLE (alterar estado de paquetes)."},
  {n:39,s:5,q:"La tabla FILTER de iptables se usa para:",opts:["Hacer NAT/masquerading","Alterar el estado de paquetes críticos","Implementar el firewall y el filtrado de paquetes","Gestionar las interfaces de red"],a:2,e:"La tabla FILTER es la usada para implementar el firewall. Aquí se produce el filtrado de paquetes."},
  {n:40,s:5,q:"La tabla NAT de iptables sirve para:",opts:["Filtrar paquetes según protocolo","Hacer que otros ordenadores se conecten a través del nuestro con nuestra IP (masquerading)","Registrar eventos de seguridad","Controlar el estado de las conexiones"],a:1,e:"La tabla NAT sirve para masquerading: hacer que otros ordenadores se conecten a servicios con nuestra IP."},
  {n:41,s:5,q:"La tabla MANGLE de iptables sirve para:",opts:["Filtrado básico de paquetes","Traducción de direcciones IP","Alterar el estado de un paquete (solo para casos críticos)","Gestionar sesiones de usuario"],a:2,e:"La tabla MANGLE sirve para alterar el estado de un paquete. Se usa solo para casos críticos."},
  {n:42,s:5,q:"En la tabla FILTER, la regla FORWARDING se usa para:",opts:["Todo el tráfico entrante","Todo el tráfico saliente","Enrutar tráfico a través de nuestro ordenador hacia otro ordenador","Alterar paquetes justo antes de que salgan"],a:2,e:"FORWARDING: para enrutar tráfico a través de nuestro ordenador hacia otro. Se supone que este tráfico no es para nosotros."},
  {n:43,s:5,q:"En iptables, el flag -F significa:",opts:["Forward (reenviar)","Filter (filtrar)","Flush/borrado de reglas","Fail (fallar)"],a:2,e:"iptables -F: borrado de todas las reglas de la cadena."},
  {n:44,s:5,q:"En iptables, el flag -A significa:",opts:["Accept (aceptar el paquete)","Append/añadir una regla al final de la cadena","Alter (alterar el paquete)","Address (especificar dirección)"],a:1,e:"iptables -A: append, añadir regla. OJO: se añade al final de la cadena."},
  {n:45,s:5,q:"En una regla iptables, --dport es:",opts:["La dirección IP de destino","El protocolo de destino","El puerto de destino","El tipo de descarte del paquete"],a:2,e:"--dport especifica el puerto de destino en la regla iptables."},
  {n:46,s:5,q:"En iptables, -j ACCEPT indica:",opts:["Registrar el paquete en el log","Rechazar el paquete enviando respuesta","Aceptar el paquete (permitir su paso)","Descartar el paquete sin respuesta"],a:2,e:"-j indica el destino del paquete. ACCEPT lo acepta. También puede ser DROP, LOG, REJECT."},
  {n:47,s:5,q:"El estado RELATED en ipt_conntrack es para:",opts:["Nuevos paquetes independientes","Paquetes de una conexión ya establecida (ESTABLISHED)","Paquetes nuevos pero relacionados con una conexión existente","Paquetes inválidos o desconocidos"],a:2,e:"RELATED: paquetes nuevos pero que ya están relacionados con una conexión existente. Ejemplo: las conexiones de datos en FTP."},
  {n:48,s:5,q:"Para guardar las reglas iptables de forma permanente se ejecuta:",opts:["iptables -save all","sudo /etc/init.d/iptables save","iptables --persist rules","save-iptables /etc/rules"],a:1,e:"/etc/init.d/iptables save guarda las reglas actualmente cargadas como reglas por defecto."},
  {n:49,s:5,q:"Para ver las reglas iptables actualmente activas se usa:",opts:["iptables -F","iptables -show","iptables -L","iptables -view"],a:2,e:"iptables -L: muestra el contenido de cada tabla y sus respectivos chains."},
  {n:50,s:5,q:"Para usar iptables, el kernel Linux debe ser superior a la versión:",opts:["2.0.0","2.3.15","3.0.0","Cualquier versión sirve"],a:1,e:"Para utilizar iptables se necesita un kernel superior a la versión 2.3.15 y recompilarlo con las opciones necesarias."}
];
let answers={}, instantMode=false, displayList=[...QUESTIONS], onlyWrongView=false, graded=false;
function letter(i){return["a","b","c","d"][i];}
function renderFilter(){
  const sel=document.getElementById("filter");
  Object.entries(SECTIONS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v;sel.appendChild(o);});
  sel.addEventListener("change",render);
}
function render(){
  const quiz=document.getElementById("quiz"); quiz.innerHTML="";
  const filter=document.getElementById("filter").value;
  let currentSection=null;
  let toShow=displayList.filter(q=>filter==="all"||String(q.s)===filter);
  if(onlyWrongView&&graded) toShow=toShow.filter(q=>answers[q.n]!==undefined&&answers[q.n]!==q.a);
  toShow.forEach(qd=>{
    if(qd.s!==currentSection&&filter==="all"){
      const div=document.createElement("div"); div.className="section-divider"; div.textContent=SECTIONS[qd.s]; quiz.appendChild(div); currentSection=qd.s;
    }
    const card=document.createElement("div"); card.className="question"; card.id="q"+qd.n;
    const h3=document.createElement("h3");
    const status=answers[qd.n]===undefined?'<span class="badge badge-pending">Sin responder</span>':(graded||instantMode)?(answers[qd.n]===qd.a?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>'):'<span class="badge badge-pending">Respondida</span>';
    h3.innerHTML=`Pregunta ${qd.n} ${status}`; card.appendChild(h3);
    const prompt=document.createElement("div"); prompt.className="prompt"; prompt.textContent=qd.q; card.appendChild(prompt);
    const opts=document.createElement("div"); opts.className="options";
    qd.opts.forEach((txt,idx)=>{
      const lbl=document.createElement("label"); lbl.className="opt";
      const radio=document.createElement("input"); radio.type="radio"; radio.name="q"+qd.n; radio.value=idx;
      if(answers[qd.n]===idx) radio.checked=true;
      radio.addEventListener("change",()=>{answers[qd.n]=idx; if(instantMode)showFeedback(qd.n); updateStats(); renderItemMarks(qd);});
      const letterSpan=document.createElement("span"); letterSpan.className="letter"; letterSpan.textContent=letter(idx)+")";
      const text=document.createElement("span"); text.textContent=txt;
      lbl.appendChild(radio); lbl.appendChild(letterSpan); lbl.appendChild(text); opts.appendChild(lbl);
    });
    card.appendChild(opts);
    const fb=document.createElement("div"); fb.className="feedback"; fb.id="fb"+qd.n; card.appendChild(fb);
    quiz.appendChild(card);
    if(graded||(instantMode&&answers[qd.n]!==undefined)){renderItemMarks(qd); if(answers[qd.n]!==undefined)showFeedback(qd.n);}
  });
  if(toShow.length===0) quiz.innerHTML='<div class="question" style="text-align:center;color:var(--muted)">No hay preguntas para mostrar.</div>';
  updateStats();
}
function renderItemMarks(qd){
  if(!graded&&!instantMode) return; if(answers[qd.n]===undefined) return;
  const card=document.getElementById("q"+qd.n); if(!card) return;
  card.querySelectorAll(".opt").forEach((lbl,idx)=>{lbl.classList.remove("correct","incorrect"); if(idx===qd.a)lbl.classList.add("correct"); else if(idx===answers[qd.n])lbl.classList.add("incorrect");});
  const h3=card.querySelector("h3"); const isOk=answers[qd.n]===qd.a;
  h3.innerHTML=`Pregunta ${qd.n} `+(isOk?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>');
}
function showFeedback(n){
  const qd=QUESTIONS.find(q=>q.n===n); const fb=document.getElementById("fb"+n); if(!fb) return;
  const isOk=answers[n]===qd.a;
  fb.className="feedback show "+(isOk?"ok":"err");
  fb.innerHTML=isOk?`✅ <b>Correcto.</b> ${qd.e}`:`❌ <b>Incorrecto.</b> Respuesta: <b>${letter(qd.a)})</b> ${qd.opts[qd.a]}. ${qd.e}`;
}
function updateStats(){
  const answered=Object.keys(answers).length;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  document.getElementById("answered").textContent=answered;
  document.getElementById("correct").textContent=correct;
  document.getElementById("wrong").textContent=answered-correct;
  document.getElementById("progress").style.width=(answered/QUESTIONS.length*100)+"%";
}
function grade(){
  graded=true;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  const total=QUESTIONS.length; const pct=Math.round(correct/total*100);
  let level,cls;
  if(correct>=45){level="Excelente. Dominás el tema del Firewall. 🚀";cls="level-elite";}
  else if(correct>=38){level="Bien. Repasá los que fallaste. 💪";cls="level-good";}
  else if(correct>=28){level="Justo. Repasá las secciones débiles. 📚";cls="level-mid";}
  else{level="Volvé a estudiar el material. Foco en tipos y limitaciones. 🔥";cls="level-bad";}
  const bySection={};
  Object.keys(SECTIONS).forEach(s=>bySection[s]={ok:0,total:0});
  QUESTIONS.forEach(q=>{bySection[q.s].total++;if(answers[q.n]===q.a)bySection[q.s].ok++;});
  const secHtml=Object.entries(SECTIONS).map(([k,v])=>{const sd=bySection[k];const sPct=Math.round(sd.ok/sd.total*100);return`<div class="sec-card"><div class="sec-name">${v}</div><div class="sec-score">${sd.ok}/${sd.total} <span style="color:var(--muted);font-size:13px;font-weight:normal">(${sPct}%)</span></div></div>`;}).join("");
  const res=document.getElementById("result"); res.classList.add("show");
  res.innerHTML=`<h2>📊 Resultado</h2><div class="score-big">${correct} / ${total} <span style="font-size:24px;color:var(--muted)">(${pct}%)</span></div><div class="score-level ${cls}">${level}</div><div class="by-section">${secHtml}</div><div style="margin-top:14px;color:var(--muted);font-size:14px">Las correctas en verde, las erradas en rojo, con explicación.</div>`;
  res.scrollIntoView({behavior:"smooth"}); render();
}
function reset(){
  if(!confirm("¿Reiniciar el test? Vas a perder las respuestas.")) return;
  answers={}; graded=false; onlyWrongView=false;
  document.getElementById("result").classList.remove("show");
  displayList=[...QUESTIONS]; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function shuffle(){
  if(graded){if(!confirm("Esto va a reiniciar tus respuestas. ¿Continuar?"))return;answers={};graded=false;}
  for(let i=displayList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[displayList[i],displayList[j]]=[displayList[j],displayList[i]];}
  render();
}
document.getElementById("btnSubmit").addEventListener("click",grade);
document.getElementById("btnReset").addEventListener("click",reset);
document.getElementById("btnShuffle").addEventListener("click",shuffle);
document.getElementById("btnInstant").addEventListener("click",()=>{instantMode=!instantMode;document.getElementById("instantState").textContent=instantMode?"ON":"OFF";render();});
document.getElementById("btnOnlyWrong").addEventListener("click",()=>{if(!graded){alert("Primero calificá el test.");return;}onlyWrongView=true;render();});
document.getElementById("btnAll").addEventListener("click",()=>{onlyWrongView=false;render();});
document.getElementById("total").textContent=QUESTIONS.length;
renderFilter(); render();
</script>
</body>
</html>
