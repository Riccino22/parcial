<style>

  .feedback.err { background:rgba(239,68,68,.1); border:1px solid var(--err); color:#fecaca; }
  .section-divider { margin:28px 0 14px; padding:10px 14px; background:linear-gradient(90deg,var(--accent-2),transparent); border-radius:8px; font-weight:600; color:white; }
  .progress-bar { height:6px; background:var(--panel-2); border-radius:3px; overflow:hidden; margin-top:8px; }

  .score-big { font-size:42px; font-weight:bold; }

  .level-elite { color:var(--ok); } .level-good { color:var(--accent); } .level-mid { color:var(--warn); } .level-bad { color:var(--err); }
  .by-section { margin-top:16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
  .sec-card { background:var(--panel-2); padding:10px 12px; border-radius:8px; border:1px solid var(--border); font-size:14px; }
  .sec-card .sec-name { color:var(--muted); font-size:12px; } .sec-card .sec-score { font-size:18px; font-weight:bold; margin-top:4px; }
  footer { text-align:center; color:var(--muted); font-size:12px; padding:16px; }

  .badge-ok { background:var(--ok); color:white; } .badge-err { background:var(--err); color:white; } .badge-pending { background:var(--muted); color:white; }
  @media (max-width:600px) { .topbar { flex-direction:column; align-items:flex-start; } main { padding:0 10px 60px; } .question { padding:14px; } }

<script>
const SECTIONS = {"1": "📏 Parte 1 — Concepto de Máscara", "2": "🔢 Parte 2 — Notación y Conversión", "3": "🧮 Parte 3 — Tabla de Máscaras y Rangos", "4": "🧩 Parte 4 — Concepto de Subredes", "5": "✏️ Parte 5 — Cálculo de Subredes", "6": "⚙️ Parte 6 — Operaciones AND/OR y Broadcast"};
const QUESTIONS = [{"n": 1, "s": 1, "q": "Una máscara de subred es:", "opts": ["Un patrón de 16 bits expresado en notación decimal", "Un patrón de 64 bits representado en hexadecimal", "La dirección MAC física asignada al router de salida", "Un patrón de 32 bits en notación decimal, igual que la IP"], "a": 3, "e": "Una máscara de subred es un patrón de 32 bits que se representa en notación decimal, igual que las direcciones IP."}, {"n": 2, "s": 1, "q": "¿Para qué permite la máscara de subred?", "opts": ["Asignar de forma automática las IPs a cada host", "Cifrar la dirección IP para enviarla con seguridad", "Definir la velocidad máxima de transmisión de la red", "Distinguir qué bits de la IP son de red y cuáles de host"], "a": 3, "e": "La máscara permite distinguir e interpretar qué bits de la IP pertenecen a la dirección de red y cuáles a la dirección de host."}, {"n": 3, "s": 1, "q": "La máscara por defecto de la clase C es:", "opts": ["255.255.255.0", "255.0.0.0", "255.255.0.0", "255.255.255.255"], "a": 0, "e": "La máscara de clase C es 255.255.255.0 (/24)."}, {"n": 4, "s": 1, "q": "La máscara por defecto de la clase B es:", "opts": ["255.0.0.0", "255.255.0.0", "255.255.255.0", "255.255.255.192"], "a": 1, "e": "La máscara de clase B es 255.255.0.0 (/16)."}, {"n": 5, "s": 1, "q": "La máscara por defecto de la clase A es:", "opts": ["255.0.0.0", "255.255.0.0", "255.255.255.0", "255.255.255.128"], "a": 0, "e": "La máscara de clase A es 255.0.0.0 (/8)."}, {"n": 6, "s": 1, "q": "En la configuración TCP/IP, un PC debe tener obligatoriamente:", "opts": ["Únicamente una dirección IP asignada", "Únicamente una máscara de red configurada", "Una dirección IP y una máscara de red", "Solamente una dirección MAC y una IP"], "a": 2, "e": "En la configuración TCP/IP los PCs deben tener una IP y una máscara de red."}, {"n": 7, "s": 1, "q": "¿Qué determina la máscara de red?", "opts": ["La velocidad de transmisión de los datos en la red", "El fabricante de la tarjeta de red instalada", "El rango de la red, o sea el número de direcciones", "La ruta por defecto que usará el equipo para salir"], "a": 2, "e": "La máscara de red determina el rango de la red, es decir, el número de direcciones de la red."}, {"n": 8, "s": 1, "q": "Dada una IP y su máscara podemos averiguar la primera dirección IP, que corresponde con:", "opts": ["La dirección de red de la subred", "La dirección de broadcast del rango", "La dirección del gateway por defecto", "La dirección del servidor DNS local"], "a": 0, "e": "La primera dirección IP del rango corresponde con la dirección de red."}, {"n": 9, "s": 1, "q": "Dada una IP y su máscara, la última dirección IP del rango corresponde con:", "opts": ["La dirección de red de la subred", "El primer host útil del rango", "El gateway predeterminado de salida", "La dirección de difusión o broadcast"], "a": 3, "e": "La última dirección IP del rango corresponde con la dirección de difusión o dirección broadcast."}, {"n": 10, "s": 2, "q": "En la forma EXTENDIDA, la IP y la máscara se indican como:", "opts": ["Con la barra y el número de bits, ej: 192.168.8.1/24", "Indicando solo el número de bits de la máscara", "Los 4 octetos de la IP y los 4 de la máscara", "Convirtiendo ambos valores a notación hexadecimal"], "a": 2, "e": "La forma extendida indica los 4 octetos de la IP y los 4 de la máscara, ej: 192.165.8.1 con 255.255.255.0."}, {"n": 11, "s": 2, "q": "En la forma REDUCIDA (CIDR), 192.168.8.1/24 significa:", "opts": ["Que la red dispone de 24 hosts útiles", "Que se trata de la red número 24 del bloque", "Que la máscara tiene 24 unos (1) en binario", "Que la red se divide en 24 subredes iguales"], "a": 2, "e": "En notación reducida (CIDR), el número tras la barra indica la cantidad de unos (1) en binario que contiene la máscara."}, {"n": 12, "s": 2, "q": "La máscara 255.255.255.0 en notación CIDR es:", "opts": ["/24", "/16", "/8", "/32"], "a": 0, "e": "255.255.255.0 tiene 24 unos, por lo tanto es /24."}, {"n": 13, "s": 2, "q": "Para pasar un byte de la máscara de binario a decimal hay que tener en cuenta que:", "opts": ["El bit más significativo se ubica a la derecha", "Todos los bits del byte tienen el mismo peso", "Se suma de derecha a izquierda con peso fijo 1", "El bit más significativo se ubica a la izquierda"], "a": 3, "e": "Se convierte byte a byte considerando que el bit más significativo está a la izquierda (peso 128)."}, {"n": 14, "s": 2, "q": "El byte binario 11100000 en decimal es:", "opts": ["192", "224", "240", "128"], "a": 1, "e": "128 + 64 + 32 = 224. Los tres bits más significativos en 1."}, {"n": 15, "s": 2, "q": "Los pesos de los 8 bits de un byte, de izquierda a derecha, son:", "opts": ["1, 2, 4, 8, 16, 32, 64, 128", "256, 128, 64, 32, 16, 8, 4, 2", "128, 64, 32, 16, 8, 4, 2, 1", "0, 1, 2, 3, 4, 5, 6, 7"], "a": 2, "e": "De izquierda (más significativo) a derecha: 128, 64, 32, 16, 8, 4, 2, 1."}, {"n": 16, "s": 2, "q": "El byte binario 11000000 en decimal es:", "opts": ["128", "224", "192", "240"], "a": 2, "e": "128 + 64 = 192."}, {"n": 17, "s": 2, "q": "El byte binario 11111000 en decimal es:", "opts": ["248", "240", "252", "224"], "a": 0, "e": "128+64+32+16+8 = 248."}, {"n": 18, "s": 3, "q": "La máscara /8 (255.0.0.0) admite un total de IPs de:", "opts": ["256", "16777216", "65536", "4096"], "a": 1, "e": "/8 admite 16.777.216 IPs totales (2^24)."}, {"n": 19, "s": 3, "q": "La máscara 255.255.255.192 corresponde a la notación:", "opts": ["/24", "/26", "/25", "/27"], "a": 1, "e": "255.255.255.192 = /26, con 64 IPs totales."}, {"n": 20, "s": 3, "q": "La máscara /30 (255.255.255.252) admite un total de IPs de:", "opts": ["2", "8", "4", "16"], "a": 2, "e": "/30 admite 4 IPs totales (2 utilizables), ideal para enlaces punto a punto."}, {"n": 21, "s": 3, "q": "Si el rango son 64 direcciones, la máscara debe ser:", "opts": ["255.255.255.0", "255.255.255.192", "255.255.255.128", "255.255.255.224"], "a": 1, "e": "64 direcciones → máscara 255.255.255.192 (/26)."}, {"n": 22, "s": 3, "q": "Si el rango son 512 direcciones, la máscara debe ser:", "opts": ["255.255.254.0", "255.255.255.0", "255.255.255.128", "255.255.0.0"], "a": 0, "e": "512 direcciones → máscara 255.255.254.0 (/23)."}, {"n": 23, "s": 3, "q": "Si el rango son 64 direcciones, ¿cuántas se pueden asignar a PCs?", "opts": ["62", "64", "63", "60"], "a": 0, "e": "Se restan 2 (red y broadcast): 64 - 2 = 62 utilizables."}, {"n": 24, "s": 3, "q": "¿Por qué se restan 2 direcciones de cada rango?", "opts": ["Una se usa para el gateway y otra para el servidor DNS", "Por motivos de seguridad que impone el firewall de red", "La primera y la última quedan reservadas (red y broadcast)", "Para dejarlas reservadas al administrador de la red"], "a": 2, "e": "Ni la primera (dirección de red) ni la última (broadcast) son utilizables por estar reservadas."}, {"n": 25, "s": 3, "q": "El número de direcciones de un rango siempre debe ser:", "opts": ["Una potencia de 2 (2, 4, 8, 16...)", "Un número par cualquiera del rango", "Un múltiplo exacto del número 10", "Siempre un valor mayor a 100"], "a": 0, "e": "El número de direcciones de un rango ha de ser una potencia de 2."}, {"n": 26, "s": 3, "q": "Si necesitamos 200 PCs, ¿qué máscara usamos?", "opts": ["255.255.255.128 (128 dir.)", "255.255.255.192 (64 dir.)", "255.255.254.0 (512 dir.)", "255.255.255.0 (256 dir.)"], "a": 3, "e": "Para 200 PCs usamos 255.255.255.0 que admite 256 direcciones (la potencia de 2 que alcanza)."}, {"n": 27, "s": 3, "q": "La máscara /25 (255.255.255.128) admite cuántas IPs totales:", "opts": ["64", "128", "256", "32"], "a": 1, "e": "/25 admite 128 IPs totales."}, {"n": 28, "s": 3, "q": "La máscara /28 (255.255.255.240) admite cuántas IPs totales:", "opts": ["8", "32", "16", "4"], "a": 2, "e": "/28 admite 16 IPs totales (14 utilizables)."}, {"n": 29, "s": 4, "q": "¿Por qué creamos divisiones de subredes? Una razón es:", "opts": ["Evitar difusiones innecesarias fuera de la subred", "Aumentar el número de IPs públicas en Internet", "Acelerar la velocidad del procesador del equipo", "Eliminar por completo la necesidad de usar routers"], "a": 0, "e": "Evita difusiones innecesarias: las difusiones no se envían más allá de la subred del usuario, aumentando la velocidad de transmisión."}, {"n": 30, "s": 4, "q": "Otra razón para crear subredes es aumentar las opciones de seguridad porque:", "opts": ["Permite aislar partes vitales y protegerlas con cortafuegos", "Cifra de forma automática todo el tráfico de la red", "Oculta las direcciones MAC de todos los equipos", "Impide por completo el acceso a Internet desde la red"], "a": 0, "e": "Separar partes vitales en subredes especiales permite implementar medidas de seguridad como cortafuegos (firewalls)."}, {"n": 31, "s": 4, "q": "Las subredes simplifican la administración porque:", "opts": ["Eliminan la necesidad de configurar máscaras de red", "Aumentan el ancho de banda disponible en cada enlace", "Reducen el número de hosts de la red a uno solo", "Permiten aplicar cambios por departamento, no equipo a equipo"], "a": 3, "e": "Es mejor hacer cambios administrativos sobre la subred que contiene a los usuarios de cada departamento que hacerlo puesto a puesto."}, {"n": 32, "s": 4, "q": "La definición de subredes es una forma de:", "opts": ["Cifrar todos los hosts que hay dentro de una red", "Organizar los hosts de una red en grupos lógicos", "Aumentar la velocidad del cableado de la red", "Eliminar por completo el tráfico de broadcast"], "a": 1, "e": "La definición de subredes es una forma de organizar los hosts que hay dentro de una red en grupos lógicos."}, {"n": 33, "s": 4, "q": "La subred permite subdividir una net-id, generalmente de clase:", "opts": ["C, aunque también A o B", "A, de forma exclusiva", "B, de forma exclusiva", "Ninguna, solo redes públicas"], "a": 0, "e": "La subred permite subdividir una net-id (generalmente clase C, pero también A o B) en dos o más redes."}, {"n": 34, "s": 4, "q": "Para conectar subredes a nivel de red (capa 3 OSI) se usan:", "opts": ["Repetidores o hubs", "Puentes (bridges) o switches", "Pasarelas (gateways) de aplicación", "Routers"], "a": 3, "e": "A nivel de red (capa 3 OSI) las subredes se conectan mediante routers."}, {"n": 35, "s": 4, "q": "Para conectar subredes a nivel de enlace (capa 2 OSI) se usan:", "opts": ["Repetidores o concentradores tipo hub", "Routers que enrutan a nivel de red", "Pasarelas o gateways de aplicación", "Puentes (bridges) o conmutadores"], "a": 3, "e": "A nivel de enlace (capa 2 OSI) se usan puentes (bridges) o conmutadores (switches)."}, {"n": 36, "s": 4, "q": "Para conectar subredes a nivel físico (capa 1 OSI) se usan:", "opts": ["Conmutadores de capa de enlace", "Routers que operan en capa 3", "Repetidores o concentradores", "Pasarelas o gateways de aplicación"], "a": 2, "e": "A nivel físico (capa 1 OSI) se usan repetidores o concentradores (hubs)."}, {"n": 37, "s": 4, "q": "La técnica de encapsulación entre subredes se conoce como:", "opts": ["Broadcasting", "Spoofing", "Masking", "Tunneling"], "a": 3, "e": "También se pueden emplear técnicas de encapsulación (tunneling)."}, {"n": 38, "s": 4, "q": "Para calcular subredes se debe tener presente:", "opts": ["Únicamente la velocidad nominal de la red", "Cuántas subredes y cuántos hosts por subred", "El fabricante del router que se va a instalar", "El número total de switches de la instalación"], "a": 1, "e": "Hay que considerar cuántas subredes se requieren y qué cantidad de hosts por subred, contemplando el crecimiento futuro."}, {"n": 39, "s": 5, "q": "La fórmula para la cantidad de subredes utilizables es:", "opts": ["2^(bits de subred), sin restar nada", "2^(bits de subred) menos 2 reservadas", "2^(bits de nodo) menos 2 reservadas", "bits de subred multiplicados por 2"], "a": 1, "e": "Cantidad de subredes utilizables = 2^(bits de subred) - 2.", "code": "2^[bits de subred] - 2 = subredes utilizables"}, {"n": 40, "s": 5, "q": "Con la red 192.168.1.0 y máscara 255.255.255.224, tomando 3 bits de subred, las subredes utilizables son:", "opts": ["8", "4", "6", "2"], "a": 2, "e": "2^3 - 2 = 8 - 2 = 6 subredes utilizables.", "code": "2^3 - 2 = 6"}, {"n": 41, "s": 5, "q": "La fórmula para la cantidad de hosts útiles por subred es:", "opts": ["2^(bits de nodo), sin restar nada", "2^(bits de subred) menos 2 hosts", "2^(bits de nodo) menos 2 hosts", "bits de nodo multiplicados por 2"], "a": 2, "e": "Cantidad de nodos útiles = 2^(bits de nodo) - 2.", "code": "2^[bits de nodo] - 2 = nodos"}, {"n": 42, "s": 5, "q": "Con máscara 255.255.255.224 quedan 5 bits de nodo. ¿Cuántos hosts útiles por subred?", "opts": ["32", "30", "28", "16"], "a": 1, "e": "2^5 - 2 = 32 - 2 = 30 hosts útiles por subred.", "code": "2^5 - 2 = 30"}, {"n": 43, "s": 5, "q": "El 'salto' o block size con máscara 255.255.255.224 se calcula:", "opts": ["224 - 32 = 192", "256 - 224 = 32", "256 / 224", "224 / 2"], "a": 1, "e": "El salto = 256 - [valor del octeto de máscara] = 256 - 224 = 32.", "code": "256 - 224 = 32"}, {"n": 44, "s": 5, "q": "Con red 192.168.1.0 y salto 32, la subred 1 (primera útil) es:", "opts": ["192.168.1.0", "192.168.1.64", "192.168.1.16", "192.168.1.32"], "a": 3, "e": "Subred 0 = .0, subred 1 (primera útil) = 192.168.1.32 (sumando el salto de 32)."}, {"n": 45, "s": 5, "q": "Para 4 subredes en una /24, ¿cuántos bits hay que tomar?", "opts": ["2 bits", "1 bit", "3 bits", "4 bits"], "a": 0, "e": "2^2 = 4. Se toman 2 bits, dando la nueva máscara /26 (255.255.255.192)."}, {"n": 46, "s": 5, "q": "Si necesitamos 500 hosts por subred, ¿cuántos bits de host se requieren?", "opts": ["8 bits (254)", "10 bits (1022)", "7 bits (126)", "9 bits (510)"], "a": 3, "e": "2^9 - 2 = 510 ≥ 500. Se necesitan 9 bits de host. Con 8 bits solo hay 254."}, {"n": 47, "s": 6, "q": "Para obtener la dirección de RED a partir de IP y máscara se aplica:", "opts": ["Una operación OR realizada bit a bit", "Una suma decimal de ambos valores", "Una operación AND realizada bit a bit", "Una operación XOR entre los valores"], "a": 2, "e": "La dirección de red se obtiene aplicando la operación AND bit a bit entre la IP y la máscara."}, {"n": 48, "s": 6, "q": "Para obtener el BROADCAST se aplica:", "opts": ["AND entre la IP y la máscara directa", "OR entre la IP y el inverso de la máscara", "AND entre la IP y el inverso de la máscara", "XOR entre la IP y la máscara directa"], "a": 1, "e": "El broadcast se obtiene con la operación OR entre la IP y el inverso (complemento) de la máscara."}, {"n": 49, "s": 6, "q": "Con IP 192.168.1.100 y máscara 255.255.255.192, la dirección de red es:", "opts": ["192.168.1.0", "192.168.1.64", "192.168.1.100", "192.168.1.128"], "a": 1, "e": "Aplicando AND, la dirección de red es 192.168.1.64."}, {"n": 50, "s": 6, "q": "Con IP 192.168.1.100 y máscara 255.255.255.192, el broadcast es:", "opts": ["192.168.1.127", "192.168.1.63", "192.168.1.255", "192.168.1.128"], "a": 0, "e": "Aplicando OR con el inverso de la máscara, el broadcast es 192.168.1.127."}, {"n": 51, "s": 6, "q": "Para calcular la máscara a partir de la dirección de red y el broadcast, los bits que coinciden:", "opts": ["Corresponden a ceros en la máscara", "Se ignoran", "Definen el host", "Corresponden a unos en la máscara"], "a": 3, "e": "Comparando bit a bit: los bits que coinciden son unos en la máscara y los que difieren son ceros."}];
const THRESH = {};
let answers={}, instantMode=false, displayList=[...QUESTIONS], onlyWrongView=false, graded=false;
function letter(i){return["a","b","c","d","e"][i];}
function renderFilter(){
  const sel=document.getElementById("filter");
  Object.entries(SECTIONS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v;sel.appendChild(o);});
  sel.addEventListener("change",render);
}
function render(){
  const quiz=document.getElementById("quiz"); quiz.innerHTML="";
  const filter=document.getElementById("filter").value;
  let currentSection=null;
  let toShow=displayList.filter(q=>filter==="all"||String(q.s)===filter);
  if(onlyWrongView&&graded) toShow=toShow.filter(q=>answers[q.n]!==undefined&&answers[q.n]!==q.a);
  toShow.forEach(qd=>{
    if(qd.s!==currentSection&&filter==="all"){
      const div=document.createElement("div"); div.className="section-divider"; div.textContent=SECTIONS[qd.s]; quiz.appendChild(div); currentSection=qd.s;
    }
    const card=document.createElement("div"); card.className="question"; card.id="q"+qd.n;
    const h3=document.createElement("h3");
    const status=answers[qd.n]===undefined?'<span class="badge badge-pending">Sin responder</span>':(graded||instantMode)?(answers[qd.n]===qd.a?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>'):'<span class="badge badge-pending">Respondida</span>';
    h3.innerHTML=`Pregunta ${qd.n} ${status}`; card.appendChild(h3);
    const prompt=document.createElement("div"); prompt.className="prompt"; prompt.textContent=qd.q; card.appendChild(prompt);
    if(qd.code){const pre=document.createElement("pre");pre.textContent=qd.code;card.appendChild(pre);}
    const opts=document.createElement("div"); opts.className="options";
    qd.opts.forEach((txt,idx)=>{
      const lbl=document.createElement("label"); lbl.className="opt";
      const radio=document.createElement("input"); radio.type="radio"; radio.name="q"+qd.n; radio.value=idx;
      if(answers[qd.n]===idx) radio.checked=true;
      radio.addEventListener("change",()=>{answers[qd.n]=idx; if(instantMode)showFeedback(qd.n); updateStats(); renderItemMarks(qd);});
      const letterSpan=document.createElement("span"); letterSpan.className="letter"; letterSpan.textContent=letter(idx)+")";
      const text=document.createElement("span"); text.textContent=txt;
      lbl.appendChild(radio); lbl.appendChild(letterSpan); lbl.appendChild(text); opts.appendChild(lbl);
    });
    card.appendChild(opts);
    const fb=document.createElement("div"); fb.className="feedback"; fb.id="fb"+qd.n; card.appendChild(fb);
    quiz.appendChild(card);
    if(graded||(instantMode&&answers[qd.n]!==undefined)){renderItemMarks(qd); if(answers[qd.n]!==undefined)showFeedback(qd.n);}
  });
  if(toShow.length===0) quiz.innerHTML='<div class="question" style="text-align:center;color:var(--muted)">No hay preguntas para mostrar.</div>';
  updateStats();
}
function renderItemMarks(qd){
  if(!graded&&!instantMode) return; if(answers[qd.n]===undefined) return;
  const card=document.getElementById("q"+qd.n); if(!card) return;
  card.querySelectorAll(".opt").forEach((lbl,idx)=>{lbl.classList.remove("correct","incorrect"); if(idx===qd.a)lbl.classList.add("correct"); else if(idx===answers[qd.n])lbl.classList.add("incorrect");});
  const h3=card.querySelector("h3"); const isOk=answers[qd.n]===qd.a;
  h3.innerHTML=`Pregunta ${qd.n} `+(isOk?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>');
}
function showFeedback(n){
  const qd=QUESTIONS.find(q=>q.n===n); const fb=document.getElementById("fb"+n); if(!fb) return;
  const isOk=answers[n]===qd.a;
  fb.className="feedback show "+(isOk?"ok":"err");
  fb.innerHTML=isOk?`✅ <b>Correcto.</b> ${qd.e}`:`❌ <b>Incorrecto.</b> Respuesta: <b>${letter(qd.a)})</b> ${qd.opts[qd.a]}. ${qd.e}`;
}
function updateStats(){
  const answered=Object.keys(answers).length;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  document.getElementById("answered").textContent=answered;
  document.getElementById("correct").textContent=correct;
  document.getElementById("wrong").textContent=answered-correct;
  document.getElementById("progress").style.width=(answered/QUESTIONS.length*100)+"%";
}
function grade(){
  graded=true;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  const total=QUESTIONS.length; const pct=Math.round(correct/total*100);
  let level,cls;
  if(pct>=90){level="Excelente. Dominás el tema. 🚀";cls="level-elite";}
  else if(pct>=75){level="Bien. Repasá los que fallaste. 💪";cls="level-good";}
  else if(pct>=55){level="Justo. Repasá las secciones débiles. 📚";cls="level-mid";}
  else{level="Volvé a estudiar el material. 🔥";cls="level-bad";}
  const bySection={};
  Object.keys(SECTIONS).forEach(s=>bySection[s]={ok:0,total:0});
  QUESTIONS.forEach(q=>{bySection[q.s].total++;if(answers[q.n]===q.a)bySection[q.s].ok++;});
  const secHtml=Object.entries(SECTIONS).map(([k,v])=>{const sd=bySection[k];const sPct=sd.total?Math.round(sd.ok/sd.total*100):0;return`<div class="sec-card"><div class="sec-name">${v}</div><div class="sec-score">${sd.ok}/${sd.total} <span style="color:var(--muted);font-size:13px;font-weight:normal">(${sPct}%)</span></div></div>`;}).join("");
  const res=document.getElementById("result"); res.classList.add("show");
  res.innerHTML=`<h2>📊 Resultado</h2><div class="score-big">${correct} / ${total} <span style="font-size:24px;color:var(--muted)">(${pct}%)</span></div><div class="score-level ${cls}">${level}</div><div class="by-section">${secHtml}</div><div style="margin-top:14px;color:var(--muted);font-size:14px">Las correctas en verde, las erradas en rojo, con explicación.</div>`;
  res.scrollIntoView({behavior:"smooth"}); render();
}
function reset(){
  if(!confirm("¿Reiniciar el test? Vas a perder las respuestas.")) return;
  answers={}; graded=false; onlyWrongView=false;
  document.getElementById("result").classList.remove("show");
  displayList=[...QUESTIONS]; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function shuffle(){
  if(graded){if(!confirm("Esto va a reiniciar tus respuestas. ¿Continuar?"))return;answers={};graded=false;}
  for(let i=displayList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[displayList[i],displayList[j]]=[displayList[j],displayList[i]];}
  render();
}
document.getElementById("btnSubmit").addEventListener("click",grade);
document.getElementById("btnReset").addEventListener("click",reset);
document.getElementById("btnShuffle").addEventListener("click",shuffle);
document.getElementById("btnInstant").addEventListener("click",()=>{instantMode=!instantMode;document.getElementById("instantState").textContent=instantMode?"ON":"OFF";render();});
document.getElementById("btnOnlyWrong").addEventListener("click",()=>{if(!graded){alert("Primero calificá el test.");return;}onlyWrongView=true;render();});
document.getElementById("btnAll").addEventListener("click",()=>{onlyWrongView=false;render();});
document.getElementById("total").textContent=QUESTIONS.length;
renderFilter(); render();
</script>
</body>
</html>
