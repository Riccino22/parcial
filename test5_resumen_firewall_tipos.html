os."}, {"n": 25, "s": 4, "q": "En el Screened Subnet se utilizan:", "opts": ["Un solo router", "Tres bastiones", "Dos routers: uno exterior y otro interior", "Ningún router"], "a": 2, "e": "Se utilizan dos routers: uno exterior y otro interior."}, {"n": 26, "s": 4, "q": "En el Screened Subnet, el router exterior tiene la misión de:", "opts": ["Bloquear el tráfico no deseado en ambos sentidos", "Asignar IPs", "Solo registrar tráfico", "Cifrar el tráfico"], "a": 0, "e": "El router exterior bloquea el tráfico no deseado en ambos sentidos (hacia la red interna y la externa)."}, {"n": 27, "s": 4, "q": "El router interior del Screened Subnet controla el tráfico entre:", "opts": ["La red interna y la DMZ", "Internet y la DMZ", "Dos redes externas", "El bastión y el proxy"], "a": 0, "e": "El router interior hace lo mismo (filtra) con la red interna y la DMZ."}, {"n": 28, "s": 4, "q": "En el Screened Subnet, la DMZ logra que:", "opts": ["Exista conexión directa entre red interna y externa", "NO exista conexión directa entre la red interna y la externa", "Se elimine el bastión", "La red sea más lenta"], "a": 1, "e": "La DMZ aísla físicamente los servicios internos; no existe conexión directa entre la red interna y la externa."}, {"n": 29, "s": 4, "q": "Si se definen varios niveles de DMZ agregando routers:", "opts": ["Las reglas deben ser iguales en todos", "No se pueden definir más niveles", "Las reglas de cada uno deben ser distintas, o los niveles se simplifican a uno solo", "Se desactiva la seguridad"], "a": 2, "e": "Las reglas de cada router deben ser distintas; de lo contrario los niveles se simplificarían a uno solo."}, {"n": 30, "s": 4, "q": "Una ventaja de estos esquemas es 'reglas de filtrado menos complejas' porque:", "opts": ["El router atiende todo el tráfico", "El router solo debe atender las solicitudes del Gateway", "No hay reglas", "El bastión no filtra"], "a": 1, "e": "Las reglas del router son menos complejas porque solo debe atender las solicitudes del Gateway."}, {"n": 31, "s": 4, "q": "Una desventaja de los esquemas con proxy/gateway es:", "opts": ["Son intrusivos, no transparentes (requieren software cliente) y más lentos", "Son transparentes y rápidos", "No ofrecen protección", "No registran actividad"], "a": 0, "e": "Desventaja: son intrusivos, no transparentes (requieren aplicación especializada) y más lentos porque revisan todo el tráfico."}, {"n": 32, "s": 4, "q": "En la DMZ típicamente se alojan servicios como:", "opts": ["Solo bases de datos internas", "Solo el firewall personal", "Solo el antivirus", "WWW, FTP, SMTP, POP (servicios públicos)"], "a": 3, "e": "En la DMZ se ofrecen servicios al exterior como WWW, FTP, SMTP y POP."}, {"n": 33, "s": 5, "q": "El firewall de Inspección de Paquetes (SPI) se basa en que:", "opts": ["Solo revisa la IP de origen", "No inspecciona nada", "Solo revisa el puerto", "Cada paquete que circula es inspeccionado, junto a su procedencia y destino"], "a": 3, "e": "SPI inspecciona cada paquete que circula, su procedencia y destino, desde la capa de Red hasta la de Aplicaciones."}, {"n": 34, "s": 5, "q": "SPI también se conoce como:", "opts": ["Filtrado estático", "Filtrado de paquetes dinámico", "Proxy de aplicación", "Túnel cifrado"], "a": 1, "e": "La inspección de paquetes (SPI) también se conoce como filtrado de paquetes dinámico."}, {"n": 35, "s": 5, "q": "Un cortafuegos de estado (SPI) mantiene el seguimiento de:", "opts": ["El estado de las conexiones de red (flujos TCP o UDP)", "Solo las MAC", "Solo los puertos abiertos", "La velocidad del enlace"], "a": 0, "e": "Un cortafuegos de estado mantiene seguimiento del estado de las conexiones (flujos TCP o UDP) y sus atributos en RAM."}, {"n": 36, "s": 5, "q": "Los atributos del 'estado de la conexión' que guarda SPI incluyen:", "opts": ["Solo la IP de origen", "Solo el protocolo", "La marca del router", "Direcciones IP, puertos y números de secuencia de los paquetes"], "a": 3, "e": "El estado de la conexión incluye direcciones IP, puertos participantes y números de secuencia de los paquetes."}, {"n": 37, "s": 5, "q": "En SPI, solo se permite pasar a los paquetes que:", "opts": ["Tengan cualquier origen", "Coincidan con una conexión activa conocida", "Estén cifrados", "Vengan del exterior"], "a": 1, "e": "El cortafuegos distingue paquetes legítimos; solo los que coinciden con una conexión activa conocida pueden pasar."}, {"n": 38, "s": 5, "q": "SPI almacena los datos de seguimiento en:", "opts": ["El disco duro", "Tablas de estados dinámicos", "La caché del navegador", "La dirección MAC"], "a": 1, "e": "La inspección de estado almacena los datos en tablas de estados dinámicos."}, {"n": 39, "s": 5, "q": "Las decisiones de filtrado en SPI se basan en:", "opts": ["Reglas del administrador y también el contexto construido por conexiones anteriores", "Solo reglas fijas del administrador", "Solo el azar", "Solo la hora del día"], "a": 0, "e": "Las decisiones no se basan solo en reglas fijas, sino también en el contexto construido por las conexiones y paquetes anteriores."}, {"n": 40, "s": 5, "q": "¿Dónde se suele instalar SPI?", "opts": ["Solo en hogares", "Solo en routers domésticos", "En cualquier PC sin red", "Cuando se requiere seguridad sensible al contexto y en aplicaciones muy complejas (redes de empresas)"], "a": 3, "e": "SPI se instala cuando se requiere seguridad sensible al contexto y en aplicaciones complejas; es común en redes de empresas."}, {"n": 41, "s": 6, "q": "Los Firewalls Personales son aplicaciones para:", "opts": ["Routers de borde", "Usuarios finales que se conectan a una red externa insegura", "Servidores de datacenter", "Switches de capa 3"], "a": 1, "e": "Los firewalls personales son aplicaciones para usuarios finales que desean conectarse a una red insegura protegiendo su PC."}, {"n": 42, "s": 6, "q": "El firewall personal funciona en el PC:", "opts": ["Solo al iniciar", "Solo al navegar", "Una vez por semana", "En forma permanente"], "a": 3, "e": "El firewall personal es un programa que funciona en el PC en forma permanente."}, {"n": 43, "s": 6, "q": "El firewall personal monitoriza las conexiones y:", "opts": ["Permite todas", "Las cifra todas", "Las acelera", "Distingue las legítimas de las de atacantes, bloqueando y notificando estas últimas"], "a": 3, "e": "Monitoriza conexiones entrantes y salientes, distingue las legítimas de las de atacantes, las bloquea y notifica al usuario."}, {"n": 44, "s": 6, "q": "El firewall personal proporciona el mayor grado de seguridad cuando se combina con:", "opts": ["Otro firewall personal", "Un segundo router", "Más cables", "Un antivirus"], "a": 3, "e": "El firewall personal, junto con un antivirus, proporciona el mayor grado de seguridad con herramientas comerciales."}, {"n": 45, "s": 6, "q": "Al instalar un firewall personal, primero hay que asegurarse de que:", "opts": ["Haya dos firewalls instalados", "El antivirus esté desactivado", "No exista ningún otro ya instalado (dos generan fallos y conflictos)", "El router esté apagado"], "a": 2, "e": "Hay que asegurarse de que no exista otro firewall personal: instalar dos no aumenta la seguridad, genera fallos y conflictos."}, {"n": 46, "s": 6, "q": "El nivel de seguridad recomendado para un usuario normal en el firewall personal es:", "opts": ["Laxo", "Estricto", "Normal", "Sin seguridad"], "a": 2, "e": "Se recomienda el nivel normal, salvo usuarios expertos, para quienes se recomienda el nivel estricto."}, {"n": 47, "s": 6, "q": "Durante los primeros días, el firewall personal enviará avisos de dos tipos:", "opts": ["Errores y advertencias del SO", "Actualizaciones y reinicios", "Virus y spam", "Peticiones de conexión de programas y ataques detectados"], "a": 3, "e": "Los avisos son de dos tipos: peticiones de conexión de programas y ataques detectados."}, {"n": 48, "s": 6, "q": "El mantenimiento de un firewall personal implica, igual que un antivirus:", "opts": ["Desinstalarlo cada mes", "Apagarlo de noche", "Actualizarlo con la última let answers={}, instantMode=false, displayList=[...QUESTIONS], onlyWrongView=false, graded=false;
function letter(i){return["a","b","c","d","e"][i];}
function renderFilter(){
  const sel=document.getElementById("filter");
  Object.entries(SECTIONS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v;sel.appendChild(o);});
  sel.addEventListener("change",render);
}
function render(){
  const quiz=document.getElementById("quiz"); quiz.innerHTML="";
  const filter=document.getElementById("filter").value;
  let currentSection=null;
  let toShow=displayList.filter(q=>filter==="all"||String(q.s)===filter);
  if(onlyWrongView&&graded) toShow=toShow.filter(q=>answers[q.n]!==undefined&&answers[q.n]!==q.a);
  toShow.forEach(qd=>{
    if(qd.s!==currentSection&&filter==="all"){
      const div=document.createElement("div"); div.className="section-divider"; div.textContent=SECTIONS[qd.s]; quiz.appendChild(div); currentSection=qd.s;
    }
    const card=document.createElement("div"); card.className="question"; card.id="q"+qd.n;
    const h3=document.createElement("h3");
    const status=answers[qd.n]===undefined?'<span class="badge badge-pending">Sin responder</span>':(graded||instantMode)?(answers[qd.n]===qd.a?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>'):'<span class="badge badge-pending">Respondida</span>';
    h3.innerHTML=`Pregunta ${qd.n} ${status}`; card.appendChild(h3);
    const prompt=document.createElement("div"); prompt.className="prompt"; prompt.textContent=qd.q; card.appendChild(prompt);
    if(qd.code){const pre=document.createElement("pre");pre.textContent=qd.code;card.appendChild(pre);}
    const opts=document.createElement("div"); opts.className="options";
    qd.opts.forEach((txt,idx)=>{
      const lbl=document.createElement("label"); lbl.className="opt";
      const radio=document.createElement("input"); radio.type="radio"; radio.name="q"+qd.n; radio.value=idx;
      if(answers[qd.n]===idx) radio.checked=true;
      radio.addEventListener("change",()=>{answers[qd.n]=idx; if(instantMode)showFeedback(qd.n); updateStats(); renderItemMarks(qd);});
      const letterSpan=document.createElement("span"); letterSpan.className="letter"; letterSpan.textContent=letter(idx)+")";
      const text=document.createElement("span"); text.textContent=txt;
      lbl.appendChild(radio); lbl.appendChild(letterSpan); lbl.appendChild(text); opts.appendChild(lbl);
    });
    card.appendChild(opts);
    const fb=document.createElement("div"); fb.className="feedback"; fb.id="fb"+qd.n; card.appendChild(fb);
    quiz.appendChild(card);
    if(graded||(instantMode&&answers[qd.n]!==undefined)){renderItemMarks(qd); if(answers[qd.n]!==undefined)showFeedback(qd.n);}
  });
  if(toShow.length===0) quiz.innerHTML='<div class="question" style="text-align:center;color:var(--muted)">No hay preguntas para mostrar.</div>';
  updateStats();
}
function renderItemMarks(qd){
  if(!graded&&!instantMode) return; if(answers[qd.n]===undefined) return;
  const card=document.getElementById("q"+qd.n); if(!card) return;
  card.querySelectorAll(".opt").forEach((lbl,idx)=>{lbl.classList.remove("correct","incorrect"); if(idx===qd.a)lbl.classList.add("correct"); else if(idx===answers[qd.n])lbl.classList.add("incorrect");});
  const h3=card.querySelector("h3"); const isOk=answers[qd.n]===qd.a;
  h3.innerHTML=`Pregunta ${qd.n} `+(isOk?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>');
}
function showFeedback(n){
  const qd=QUESTIONS.find(q=>q.n===n); const fb=document.getElementById("fb"+n); if(!fb) return;
  const isOk=answers[n]===qd.a;
  fb.className="feedback show "+(isOk?"ok":"err");
  fb.innerHTML=isOk?`✅ <b>Correcto.</b> ${qd.e}`:`❌ <b>Incorrecto.</b> Respuesta: <b>${letter(qd.a)})</b> ${qd.opts[qd.a]}. ${qd.e}`;
}
function updateStats(){
  const answered=Object.keys(answers).length;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  document.getElementById("answered").textContent=answered;
  document.getElementById("correct").textContent=correct;
  document.getElementById("wrong").textContent=answered-correct;
  document.getElementById("progress").style.width=(answered/QUESTIONS.length*100)+"%";
}
function grade(){
  graded=true;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  const total=QUESTIONS.length; const pct=Math.round(correct/total*100);
  let level,cls;
  if(pct>=90){level="Excelente. Dominás el tema. 🚀";cls="level-elite";}
  else if(pct>=75){level="Bien. Repasá los que fallaste. 💪";cls="level-good";}
  else if(pct>=55){level="Justo. Repasá las secciones débiles. 📚";cls="level-mid";}
  else{level="Volvé a estudiar el material. 🔥";cls="level-bad";}
  const bySection={};
  Object.keys(SECTIONS).forEach(s=>bySection[s]={ok:0,total:0});
  QUESTIONS.forEach(q=>{bySection[q.s].total++;if(answers[q.n]===q.a)bySection[q.s].ok++;});
  const secHtml=Object.entries(SECTIONS).map(([k,v])=>{const sd=bySection[k];const sPct=sd.total?Math.round(sd.ok/sd.total*100):0;return`<div class="sec-card"><div class="sec-name">${v}</div><div class="sec-score">${sd.ok}/${sd.total} <span style="color:var(--muted);font-size:13px;font-weight:normal">(${sPct}%)</span></div></div>`;}).join("");
  const res=document.getElementById("result"); res.classList.add("show");
  res.innerHTML=`<h2>📊 Resultado</h2><div class="score-big">${correct} / ${total} <span style="font-size:24px;color:var(--muted)">(${pct}%)</span></div><div class="score-level ${cls}">${level}</div><div class="by-section">${secHtml}</div><div style="margin-top:14px;color:var(--muted);font-size:14px">Las correctas en verde, las erradas en rojo, con explicación.</div>`;
  res.scrollIntoView({behavior:"smooth"}); render();
}
function reset(){
  if(!confirm("¿Reiniciar el test? Vas a perder las respuestas.")) return;
  answers={}; graded=false; onlyWrongView=false;
  document.getElementById("result").classList.remove("show");
  displayList=[...QUESTIONS]; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function shuffle(){
  if(graded){if(!confirm("Esto va a reiniciar tus respuestas. ¿Continuar?"))return;answers={};graded=false;}
  for(let i=displayList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[displayList[i],displayList[j]]=[displayList[j],displayList[i]];}
  render();
}
document.getElementById("btnSubmit").addEventListener("click",grade);
document.getElementById("btnReset").addEventListener("click",reset);
document.getElementById("btnShuffle").addEventListener("click",shuffle);
document.getElementById("btnInstant").addEventListener("click",()=>{instantMode=!instantMode;document.getElementById("instantState").textContent=instantMode?"ON":"OFF";render();});
document.getElementById("btnOnlyWrong").addEventListener("click",()=>{if(!graded){alert("Primero calificá el test.");return;}onlyWrongView=true;render();});
document.getElementById("btnAll").addEventListener("click",()=>{onlyWrongView=false;render();});
document.getElementById("total").textContent=QUESTIONS.length;
renderFilter(); render();
</script>
</body>
</html>
