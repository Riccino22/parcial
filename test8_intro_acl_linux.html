const QUESTIONS = [{"n": 1, "s": 1, "q": "Según el documento, ¿cuántos tipos de permisos otorga el sistema de archivos de Linux?", "opts": ["Dos tipos diferenciados", "Tres tipos diferenciados", "Cuatro tipos diferenciados", "Cinco tipos diferenciados"], "a": 1, "e": "El documento dice que el sistema de archivos de Linux otorga tres tipos de permisos: Usuario, Grupo y Other.", "code": ""}, {"n": 2, "s": 1, "q": "¿Cuáles son los tres tipos de permisos que menciona el documento?", "opts": ["Lectura, escritura y borrado", "Local, remoto y compartido", "Usuario, Grupo y Other (todos los demás)", "Propietario, invitado y administrador"], "a": 2, "e": "Los tres tipos son Usuario (propietario del usuario), Grupo (grupo de propietarios) y Other (todos los demás).", "code": ""}, {"n": 3, "s": 1, "q": "A qué se refiere el permiso 'Other' descrito en el documento?", "opts": ["Al administrador root del sistema", "A los servicios del kernel", "A todos los demás usuarios", "Al grupo propietario del archivo"], "a": 2, "e": "'Other' se define en el documento como 'todos los demás', es decir, los que no son ni el usuario propietario ni el grupo propietario.", "code": ""}, {"n": 4, "s": 1, "q": "¿Cuántos tipos de acceso menciona el documento que se pueden otorgar (incluyendo los especiales)?", "opts": ["Tres, aunque en realidad son cinco", "Solo tres en total", "Cuatro en total", "Seis distintos"], "a": 0, "e": "El documento aclara que se otorgan tres tipos de acceso, pero que en realidad son cinco (mencionando que llegará a eso luego).", "code": ""}, {"n": 5, "s": 1, "q": "¿Cuáles son los tres niveles de acceso básicos que indica el documento?", "opts": ["Crear, mover y copiar", "Ver, editar y compartir", "Abrir, cerrar y bloquear", "Leer, Escribir y Ejecutar"], "a": 3, "e": "Los tres niveles de acceso básicos son Leer, Escribir y Ejecutar.", "code": ""}, {"n": 6, "s": 1, "q": "En la cadena de permisos 'drwxrwxr-x', ¿qué puede hacer el grupo propietario?", "opts": ["Leer, escribir y ejecutar", "Solo leer y ejecutar", "Solo leer", "Nada, no tiene acceso"], "a": 0, "e": "En 'drwxrwxr-x' el segundo bloque 'rwx' corresponde al grupo, que puede leer, escribir y ejecutar.", "code": "drwxrwxr-x 2 accounting accounting 12 Jan 8 15:13"}, {"n": 7, "s": 1, "q": "En 'drwxrwxr-x', ¿qué pueden hacer los otros usuarios (other)?", "opts": ["Leer, escribir y ejecutar", "Ver y ejecutar el contenido", "Solo escribir en el directorio", "No tienen ningún acceso"], "a": 1, "e": "El último bloque 'r-x' permite a los otros usuarios leer (ver) y ejecutar el contenido, lo cual el documento señala como posiblemente una mala idea.", "code": "drwxrwxr-x 2 accounting accounting 12 Jan 8 15:13"}, {"n": 8, "s": 1, "q": "Para evitar que usuarios ajenos al departamento vean el contenido, ¿a qué permisos se cambia el directorio según el documento?", "opts": ["drwxr-xr-x", "drwx------", "drwxrwx---", "drwxrwxrwx"], "a": 2, "e": "El documento cambia los permisos a 'drwxrwx---' para que solo el usuario y el grupo accounting tengan acceso y 'other' quede sin acceso.", "code": "drwxrwx--- 2 accounting accounting 12 Jan 8 15:13 ."}, {"n": 9, "s": 1, "q": "¿Qué controla la opción 'sticky bit' mencionada en la nota del documento?", "opts": ["El cifrado de los archivos del directorio", "La cuota máxima de disco por usuario", "La cantidad de archivos que se pueden crear", "Si los miembros del grupo pueden eliminar archivos de los demás"], "a": 3, "e": "El documento indica que el 'sticky bit' controla si los miembros del grupo pueden eliminar los archivos de los demás.", "code": ""}, {"n": 10, "s": 1, "q": "Según el documento, ¿qué problema tienen los permisos regulares de Linux?", "opts": ["No distinguen entre lectura y escritura", "Cada archivo solo puede tener un usuario y un grupo propietario a la vez", "No funcionan en directorios, solo en archivos", "Requieren reiniciar el sistema para aplicarse"], "a": 1, "e": "Con los permisos regulares cada archivo y directorio solo puede tener un usuario y un grupo propietario a la vez, lo que limita escenarios más complejos.", "code": ""}, {"n": 11, "s": 1, "q": "¿Qué tipo de situación buscan resolver las ACL de Linux según el documento?", "opts": ["Acelerar el acceso a discos lentos", "Dar acceso específico a usuarios o grupos adicionales sin cambiar la propiedad", "Hacer copias de seguridad automáticas de archivos", "Comprimir archivos para ahorrar espacio en disco"], "a": 1, "e": "Las ACL resuelven la necesidad de aplicar permisos más específicos a usuarios o grupos adicionales sin cambiar necesariamente la propiedad básica.", "code": ""}, {"n": 12, "s": 1, "q": "¿Qué permiten hacer las ACL según la definición del documento?", "opts": ["Reemplazar por completo el sistema de permisos de Linux", "Encriptar el contenido de los archivos sensibles", "Aplicar permisos más específicos añadiendo acceso a otros usuarios o grupos", "Convertir un directorio en un recurso de red compartido"], "a": 2, "e": "Las ACL permiten aplicar un conjunto de permisos más específico añadiendo acceso a otros usuarios o grupos sin cambiar la propiedad básica.", "code": ""}, {"n": 13, "s": 2, "q": "¿Qué comando se utiliza para ver la ACL actual de un archivo o directorio?", "opts": ["lsacl", "getfacl", "showacl", "aclview"], "a": 1, "e": "El comando para visualizar la ACL actual es getfacl.", "code": "getfacl /accounting"}, {"n": 14, "s": 2, "q": "¿Qué mensaje muestra getfacl al recibir una ruta absoluta?", "opts": ["Adding trailing slash to path", "Path does not exist", "Removing leading '/' from absolute path names", "Converting path to relative format"], "a": 2, "e": "getfacl muestra el aviso 'Removing leading / from absolute path names' al quitar la barra inicial de rutas absolutas.", "code": "getfacl /accounting"}, {"n": 15, "s": 2, "q": "En la salida de getfacl, ¿qué línea indica el propietario del archivo?", "opts": ["# owner:", "# user:", "# file:", "# group:"], "a": 0, "e": "La línea '# owner:' muestra el propietario del archivo en la salida de getfacl.", "code": ""}, {"n": 16, "s": 2, "q": "En un directorio recién creado sin ACL, ¿qué entradas de permisos aparecen en getfacl?", "opts": ["user::, group:: y other::", "Solo user:: y other::", "Solo default:user:: y default:group::", "mask:: y owner:: únicamente"], "a": 0, "e": "Sin ACL agregadas, getfacl solo lista user::, group:: y other::, que corresponden a los permisos regulares.", "code": ""}, {"n": 17, "s": 2, "q": "En la salida inicial de getfacl del directorio accounting, ¿qué permisos tiene 'other::'?", "opts": ["rwx (acceso total)", "r-x (lectura y ejecución)", "rw- (lectura y escritura)", "--- (sin acceso)"], "a": 3, "e": "La salida muestra 'other::---', lo que significa que los demás usuarios no tienen ningún acceso.", "code": "other::---"}, {"n": 18, "s": 2, "q": "En la salida inicial, ¿qué permisos tienen 'user::' y 'group::' sobre el directorio accounting?", "opts": ["rwx en ambos casos", "r-x en ambos casos", "rw- en ambos casos", "--- en ambos casos"], "a": 0, "e": "La salida muestra 'user::rwx' y 'group::rwx', es decir acceso de lectura, escritura y ejecución.", "code": "user::rwx\ngroup::rwx"}, {"n": 19, "s": 2, "q": "¿Por qué el documento explica que es esperable no encontrar ACL en ese directorio?", "opts": ["Porque las ACL están deshabilitadas en Linux por defecto", "Porque el directorio acababa de crearse y solo se le asignó la propiedad", "Porque getfacl no detecta ACL en directorios vacíos", "Porque solo root puede tener ACL definidas"], "a": 1, "e": "El documento aclara que es de esperar no ver ACL porque el directorio se acababa de crear en el laboratorio y solo se le había asignado la propiedad.", "code": ""}, {"n": 20, "s": 3, "q": "¿Cuál es la sintaxis general para configurar una ACL según el documento?", "opts": ["acl [option] [file] [permisos]", "setfacl [option] [action/specification] file", "getfacl [user] [permisos] file", "chmod [option] [acl] file"], "a": 1, "e": "La sintaxis indicada es: setfacl [option] [action/specification] file.", "code": "setfacl [option] [action/specification] file"}, {"n": 21, "s": 3, "q": "¿Qué acción de setfacl se usa para modificar una ACL?", "opts": ["-a", "-u", "-c", "-m"], "a": 3, "e": "La acción -m se usa para modificar (añadir o cambiar) una entrada de ACL.", "code": "setfacl -m"}, {"n": 22, "s": 3, "q": "¿Qué acción de setfacl se usa para eliminar una entrada de ACL?", "opts": ["-r", "-d", "-x", "-e"], "a": 2, "e": "La acción -x se usa para eliminar una entrada de ACL.", "code": "setfacl -x"}, {"n": 23, "s": 3, "q": "¿Qué representa la opción -d en setfacl?", "opts": ["Eliminar todas las ACL del archivo", "Mostrar la ACL en formato detallado", "Aplicar la ACL de forma recursiva", "Configurar valores predeterminados (default)"], "a": 3, "e": "La opción -d indica valores predeterminados (default), usados para definir la ACL predeterminada de un directorio.", "code": "setfacl -d -m"}, {"n": 24, "s": 3, "q": "¿Qué hace el comando que configura la ACL predeterminada del directorio accounting?", "opts": ["Elimina la ACL del grupo accounting", "Define la ACL predeterminada rwx para accounting", "Cambia el propietario del directorio a accounting", "Bloquea el acceso a todos los usuarios"], "a": 1, "e": "El comando 'setfacl -d -m accounting:rwx /accounting' establece la ACL predeterminada con permisos rwx para accounting.", "code": "setfacl -d -m accounting:rwx /accounting"}, {"n": 25, "s": 3, "q": "Tras definir la ACL predeterminada, ¿qué prefijo aparece en las nuevas entradas de getfacl?", "opts": ["base:", "default:", "auto:", "new:"], "a": 1, "e": "Las entradas predeterminadas aparecen con el prefijo 'default:', por ejemplo default:user::rwx o default:mask::rwx.", "code": "default:user::rwx"}, {"n": 26, "s": 3, "q": "¿Qué entrada especial aparece entre las líneas 'default:' tras configurar la ACL predeterminada?", "opts": ["default:sticky::rwx", "default:root::rwx", "default:mask::rwx", "default:admin::rwx"], "a": 2, "e": "Entre las líneas default aparece 'default:mask::rwx', que define la máscara de permisos efectivos predeterminada.", "code": "default:mask::rwx"}, {"n": 27, "s": 3, "q": "Según la nota del documento, ¿cómo se especifica que una ACL es de grupo?", "opts": ["Colocando 'g:' antes del nombre del grupo", "Colocando 'grp=' al final del comando", "Usando la opción --group en setfacl", "Escribiendo el grupo en mayúsculas"], "a": 0, "e": "Para una ACL de grupo se coloca 'g:' antes del nombre del grupo; para usuarios setfacl asume usuario si no se indica nada.", "code": "setfacl -m g:accounting:- ./kenny"}, {"n": 28, "s": 3, "q": "Si no se coloca ningún prefijo (g o u) en la especificación, ¿qué asume setfacl?", "opts": ["Que se trata de un grupo", "Que se trata del usuario root", "Que se trata de un usuario", "Que se aplica a 'other'"], "a": 2, "e": "El documento indica que setfacl asume que se trata de un usuario si no se coloca nada (ni g ni u) en ese espacio.", "code": ""}, {"n": 29, "s": 4, "q": "En el escenario del documento, ¿quién es el becario de contabilidad?", "opts": ["Fred", "Lisa", "Jan", "Kenny"], "a": 3, "e": "Kenny es el becario de contabilidad que necesita acceso para leer archivos y crear archivos propios.", "code": ""}, {"n": 30, "s": 4, "q": "¿Quién es Fred dentro del escenario planteado?", "opts": ["El gerente de Kenny", "La directora ejecutiva", "Un usuario del equipo de ventas", "El administrador del sistema"], "a": 0, "e": "Fred es el gerente, cuyos archivos podría necesitar leer Kenny.", "code": ""}, {"n": 31, "s": 4, "q": "¿Por qué Kenny inicialmente no podría crear archivos en accounting?", "opts": ["Porque el directorio está en modo solo lectura", "Porque kenny no pertenece al grupo accounting", "Porque getfacl bloquea a los becarios", "Porque no existe su cuenta de usuario aún"], "a": 1, "e": "Como kenny no está en el grupo accounting, en principio no tiene permiso para crear archivos allí.", "code": ""}, {"n": 32, "s": 4, "q": "Cuando Fred crea el archi  "chmod kenny:accounting ./kenny", "getfacl kenny:accounting ./kenny", "chown kenny:accounting ./kenny"], "a": 3, "e": "El comando 'chown kenny:accounting ./kenny' asigna a kenny como propietario y accounting como grupo propietario.", "code": "chown kenny:accounting ./kenny"}, {"n": 38, "s": 4, "q": "Cuando Kenny intenta crear 'test' fuera de su carpeta, ¿qué mensaje recibe?", "opts": ["File already exists", "Permission denied", "No such file or directory", "Operation not permitted by ACL"], "a": 1, "e": "Kenny recibe 'touch: cannot touch test: Permission denied' al intentar crear un archivo fuera de su propia carpeta.", "code": "touch test"}, {"n": 39, "s": 4, "q": "Tras la configuración, ¿qué puede hacer Kenny finalmente?", "opts": ["Administrar las ACL de todo el directorio", "Eliminar archivos de cualquier miembro del grupo", "Ver la carpeta de contabilidad pero solo crear archivos en su propia carpeta", "Cambiar la propiedad de los archivos de Fred"], "a": 2, "e": "Kenny puede ver la carpeta de contabilidad pero solo crear archivos dentro de su propia carpeta.", "code": ""}, {"n": 40, "s": 4, "q": "¿Por qué cualquier miembro del grupo accounting puede guardar archivos en la carpeta de Kenny inicialmente?", "opts": ["Porque kenny les dio permiso ACL explícito", "Porque root copió las ACL del directorio padre", "Porque el sticky bit está desactivado", "Porque la carpeta pertenece al grupo accounting"], "a": 3, "e": "Como la carpeta pertenece al grupo accounting, cualquiera de sus miembros puede guardar archivos allí.", "code": ""}, {"n": 41, "s": 4, "q": "¿A quién se le da acceso a la carpeta de Kenny aunque no es del equipo de contabilidad?", "opts": ["Jan, del soporte técnico", "Fred, el gerente", "Kenny, otro becario", "Lisa, la directora ejecutiva"], "a": 3, "e": "Se le da acceso rwx a Lisa, la directora ejecutiva, que no es miembro del equipo de contabilidad.", "code": "setfacl -m u:lisa:rwx ./kenny"}, {"n": 42, "s": 4, "q": "¿Qué comando crea la cuenta del const THRESH = {};
let answers={}, instantMode=false, displayList=[...QUESTIONS], onlyWrongView=false, graded=false;
function letter(i){return["a","b","c","d","e"][i];}
function renderFilter(){
  const sel=document.getElementById("filter");
  Object.entries(SECTIONS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v;sel.appendChild(o);});
  sel.addEventListener("change",render);
}
function render(){
  const quiz=document.getElementById("quiz"); quiz.innerHTML="";
  const filter=document.getElementById("filter").value;
  let currentSection=null;
  let toShow=displayList.filter(q=>filter==="all"||String(q.s)===filter);
  if(onlyWrongView&&graded) toShow=toShow.filter(q=>answers[q.n]!==undefined&&answers[q.n]!==q.a);
  toShow.forEach(qd=>{
    if(qd.s!==currentSection&&filter==="all"){
      const div=document.createElement("div"); div.className="section-divider"; div.textContent=SECTIONS[qd.s]; quiz.appendChild(div); currentSection=qd.s;
    }
    const card=document.createElement("div"); card.className="question"; card.id="q"+qd.n;
    const h3=document.createElement("h3");
    const status=answers[qd.n]===undefined?'<span class="badge badge-pending">Sin responder</span>':(graded||instantMode)?(answers[qd.n]===qd.a?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>'):'<span class="badge badge-pending">Respondida</span>';
    h3.innerHTML=`Pregunta ${qd.n} ${status}`; card.appendChild(h3);
    const prompt=document.createElement("div"); prompt.className="prompt"; prompt.textContent=qd.q; card.appendChild(prompt);
    if(qd.code){const pre=document.createElement("pre");pre.textContent=qd.code;card.appendChild(pre);}
    const opts=document.createElement("div"); opts.className="options";
    qd.opts.forEach((txt,idx)=>{
      const lbl=document.createElement("label"); lbl.className="opt";
      const radio=document.createElement("input"); radio.type="radio"; radio.name="q"+qd.n; radio.value=idx;
      if(answers[qd.n]===idx) radio.checked=true;
      radio.addEventListener("change",()=>{answers[qd.n]=idx; if(instantMode)showFeedback(qd.n); updateStats(); renderItemMarks(qd);});
      const letterSpan=document.createElement("span"); letterSpan.className="letter"; letterSpan.textContent=letter(idx)+")";
      const text=document.createElement("span"); text.textContent=txt;
      lbl.appendChild(radio); lbl.appendChild(letterSpan); lbl.appendChild(text); opts.appendChild(lbl);
    });
    card.appendChild(opts);
    const fb=document.createElement("div"); fb.className="feedback"; fb.id="fb"+qd.n; card.appendChild(fb);
    quiz.appendChild(card);
    if(graded||(instantMode&&answers[qd.n]!==undefined)){renderItemMarks(qd); if(answers[qd.n]!==undefined)showFeedback(qd.n);}
  });
  if(toShow.length===0) quiz.innerHTML='<div class="question" style="text-align:center;color:var(--muted)">No hay preguntas para mostrar.</div>';
  updateStats();
}
function renderItemMarks(qd){
  if(!graded&&!instantMode) return; if(answers[qd.n]===undefined) return;
  const card=document.getElementById("q"+qd.n); if(!card) return;
  card.querySelectorAll(".opt").forEach((lbl,idx)=>{lbl.classList.remove("correct","incorrect"); if(idx===qd.a)lbl.classList.add("correct"); else if(idx===answers[qd.n])lbl.classList.add("incorrect");});
  const h3=card.querySelector("h3"); const isOk=answers[qd.n]===qd.a;
  h3.innerHTML=`Pregunta ${qd.n} `+(isOk?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>');
}
function showFeedback(n){
  const qd=QUESTIONS.find(q=>q.n===n); const fb=document.getElementById("fb"+n); if(!fb) return;
  const isOk=answers[n]===qd.a;
  fb.className="feedback show "+(isOk?"ok":"err");
  fb.innerHTML=isOk?`✅ <b>Correcto.</b> ${qd.e}`:`❌ <b>Incorrecto.</b> Respuesta: <b>${letter(qd.a)})</b> ${qd.opts[qd.a]}. ${qd.e}`;
}
function updateStats(){
  const answered=Object.keys(answers).length;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  document.getElementById("answered").textContent=answered;
  document.getElementById("correct").textContent=correct;
  document.getElementById("wrong").textContent=answered-correct;
  document.getElementById("progress").style.width=(answered/QUESTIONS.length*100)+"%";
}
function grade(){
  graded=true;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  const total=QUESTIONS.length; const pct=Math.round(correct/total*100);
  let level,cls;
  if(pct>=90){level="Excelente. Dominás el tema. 🚀";cls="level-elite";}
  else if(pct>=75){level="Bien. Repasá los que fallaste. 💪";cls="level-good";}
  else if(pct>=55){level="Justo. Repasá las secciones débiles. 📚";cls="level-mid";}
  else{level="Volvé a estudiar el material. 🔥";cls="level-bad";}
  const bySection={};
  Object.keys(SECTIONS).forEach(s=>bySection[s]={ok:0,total:0});
  QUESTIONS.forEach(q=>{bySection[q.s].total++;if(answers[q.n]===q.a)bySection[q.s].ok++;});
  const secHtml=Object.entries(SECTIONS).map(([k,v])=>{const sd=bySection[k];const sPct=sd.total?Math.round(sd.ok/sd.total*100):0;return`<div class="sec-card"><div class="sec-name">${v}</div><div class="sec-score">${sd.ok}/${sd.total} <span style="color:var(--muted);font-size:13px;font-weight:normal">(${sPct}%)</span></div></div>`;}).join("");
  const res=document.getElementById("result"); res.classList.add("show");
  res.innerHTML=`<h2>📊 Resultado</h2><div class="score-big">${correct} / ${total} <span style="font-size:24px;color:var(--muted)">(${pct}%)</span></div><div class="score-level ${cls}">${level}</div><div class="by-section">${secHtml}</div><div style="margin-top:14px;color:var(--muted);font-size:14px">Las correctas en verde, las erradas en rojo, con explicación.</div>`;
  res.scrollIntoView({behavior:"smooth"}); render();
}
function reset(){
  if(!confirm("¿Reiniciar el test? Vas a perder las respuestas.")) return;
  answers={}; graded=false; onlyWrongView=false;
  document.getElementById("result").classList.remove("show");
  displayList=[...QUESTIONS]; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function shuffle(){
  if(graded){if(!confirm("Esto va a reiniciar tus respuestas. ¿Continuar?"))return;answers={};graded=false;}
  for(let i=displayList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[displayList[i],displayList[j]]=[displayList[j],displayList[i]];}
  render();
}
document.getElementById("btnSubmit").addEventListener("click",grade);
document.getElementById("btnReset").addEventListener("click",reset);
document.getElementById("btnShuffle").addEventListener("click",shuffle);
document.getElementById("btnInstant").addEventListener("click",()=>{instantMode=!instantMode;document.getElementById("instantState").textContent=instantMode?"ON":"OFF";render();});
document.getElementById("btnOnlyWrong").addEventListener("click",()=>{if(!graded){alert("Primero calificá el test.");return;}onlyWrongView=true;render();});
document.getElementById("btnAll").addEventListener("click",()=>{onlyWrongView=false;render();});
document.getElementById("total").textContent=QUESTIONS.length;
renderFilter(); render();
</script>
