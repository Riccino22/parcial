const QUESTIONS = [{"n": 1, "s": 1, "q": "¿Cuántas entidades permite configurar el modelo tradicional de permisos de Unix (chmod)?", "opts": ["Tres: el propietario, un único grupo y los demás", "Dos: solo el propietario y un único grupo asignado", "Cuatro: propietario, grupo, máscara y los demás", "Ilimitadas: cualquier cantidad de usuarios y grupos"], "a": 0, "e": "El documento indica que chmod solo permite establecer el acceso para tres entidades: el propietario, un único grupo y todos los demás."}, {"n": 2, "s": 1, "q": "¿Qué significa la sigla ACL según el documento?", "opts": ["Acceso Controlado a los Logins", "Acceso Compartido de la Lectura", "Administración Central de Linux", "Lista de Control de Acceso"], "a": 3, "e": "ACL corresponde a Lista de Control de Acceso, la utilidad que gestiona permisos detallados."}, {"n": 3, "s": 1, "q": "¿Qué problema principal resuelve el sistema de ACL frente a los permisos estándar?", "opts": ["Acelera la lectura de los archivos muy grandes", "Reemplaza por completo a chmod en todo el sistema", "Permite a múltiples usuarios y grupos permisos propios", "Cifra de forma automática los archivos confidenciales"], "a": 2, "e": "Las ACL resuelven la limitación al permitir que múltiples usuarios y grupos tengan permisos personalizados en cualquier archivo o directorio."}, {"n": 4, "s": 1, "q": "Según el documento, ¿qué traen preinstalado la mayoría de las distribuciones modernas de Linux?", "opts": ["El servidor web Apache ya configurado", "SELinux activado en modo obligatorio", "La utilidad rsync con el flag -A activo", "El soporte de ACL ya disponible"], "a": 3, "e": "El documento señala que la mayoría de las distribuciones modernas de Linux vienen con soporte para ACL preinstalado."}, {"n": 5, "s": 1, "q": "¿Qué comando se usa para verificar la versión instalada y comprobar la disponibilidad de ACL?", "opts": ["acl --check", "mount --acl", "setfacl --test", "getfacl --version"], "a": 3, "e": "El documento usa getfacl --version para comprobar si ACL está instalado.", "code": "getfacl --version"}, {"n": 6, "s": 1, "q": "¿Cuál es el comando de instalación de ACL en RHEL/CentOS/Rocky Linux/AlmaLinux?", "opts": ["sudo dnf install acl", "sudo apt install acl", "sudo yum enable acl", "sudo pacman -S acl"], "a": 0, "e": "Para las distribuciones basadas en RHEL el documento usa el gestor dnf.", "code": "sudo dnf install acl"}, {"n": 7, "s": 1, "q": "¿Cuál es el comando de instalación de ACL en Debian/Ubuntu?", "opts": ["sudo dnf install acl", "sudo apt install acl", "sudo zypper add acl", "sudo apt enable acl"], "a": 1, "e": "En Debian/Ubuntu el documento indica usar apt para instalar el paquete acl.", "code": "sudo apt install acl"}, {"n": 8, "s": 1, "q": "¿Cuáles sistemas de archivos modernos menciona el documento con soporte de ACL habilitado por defecto?", "opts": ["FAT32, NTFS y exFAT", "ext2, ReiserFS y JFS", "ext4, XFS y Btrfs", "ZFS, NFS y tmpfs"], "a": 2, "e": "El documento menciona ext4, XFS y Btrfs como sistemas modernos con compatibilidad ACL habilitada de forma predeterminada."}, {"n": 9, "s": 1, "q": "¿Qué comando permite verificar en las opciones de montaje si las ACL están habilitadas?", "opts": ["lsacl /", "fstab acl", "getfacl /", "mount | grep acl"], "a": 3, "e": "El documento usa mount | grep acl para verificar las ACL en las opciones de montaje.", "code": "mount | grep acl"}, {"n": 10, "s": 1, "q": "Si las ACL no están habilitadas, ¿dónde se debe agregar la opción 'acl' para que sea permanente?", "opts": ["En /etc/fstab", "En /etc/passwd", "En /etc/hosts", "En /etc/profile"], "a": 0, "e": "El documento indica agregar la opción acl en /etc/fstab y volver a montar para hacerla permanente."}, {"n": 11, "s": 1, "q": "¿Qué herramienta complementa a setfacl para visualizar las ACL actuales de un archivo?", "opts": ["lsfacl", "catacl", "showacl", "getfacl"], "a": 3, "e": "getfacl es el comando que muestra las ACL actuales de un archivo o directorio.", "code": "getfacl file"}, {"n": 12, "s": 1, "q": "¿Para qué tipo de entornos recomienda el documento usar setfacl en lugar de chmod?", "opts": ["Para sistemas embebidos que no tienen disco", "Para entornos multiusuario con control fino", "Solo para los servidores de bases de datos", "Únicamente para equipos de escritorio personales"], "a": 1, "e": "La regla general indica usar setfacl cuando se necesita control detallado o para varios usuarios/grupos con permisos diferentes (entornos multiusuario)."}, {"n": 13, "s": 2, "q": "¿Cuál es la sintaxis general del comando setfacl según el documento?", "opts": ["setfacl file [acl_spec] [options]", "setfacl [acl_spec] [options] file", "acl_spec setfacl [options] file", "setfacl [options] [acl_spec] file"], "a": 3, "e": "La sintaxis general documentada es setfacl [options] [acl_spec] file/directory.", "code": "setfacl [options] [acl_spec] file/directory"}, {"n": 14, "s": 2, "q": "¿Cuál es el patrón que sigue la especificación ACL (acl_spec)?", "opts": ["[d:]<type>:<qualifier>:<permissions>", "<file>:<user>:<permissions>:<type>", "<options>:<type>:<file>:<permissions>", "<qualifier>:[d:]<permissions>:<type>"], "a": 0, "e": "La especificación ACL sigue el patrón [d:]<type>:<qualifier>:<permissions>."}, {"n": 15, "s": 2, "q": "En la especificación ACL, ¿qué tipos (type) son válidos?", "opts": ["a (all), s (self), r (root) y x (exec)", "u (usuario), g (grupo), o (otro), m (máscara)", "p (público), x (exec), w (write) y r (read)", "f (file), d (dir), l (link) y b (block)"], "a": 1, "e": "Los tipos válidos son u (usuario), g (grupo), o (otro) y m (máscara)."}, {"n": 16, "s": 2, "q": "En la especificación ACL, ¿qué representa el componente <qualifier>?", "opts": ["El tipo del sistema de archivos en uso", "La opción recursiva propia del comando", "El usuario/grupo, o vacío para el dueño", "El conjunto de permisos rwx, solamente"], "a": 2, "e": "El qualifier es el nombre de usuario, nombre de grupo o vacío para indicar propietario/grupo del archivo."}, {"n": 17, "s": 2, "q": "En el componente <permissions>, ¿qué letra representa el permiso de escritura?", "opts": ["r", "w", "x", "-"], "a": 1, "e": "En la especificación, w corresponde a escribir; r a leer, x/X a ejecutar y - a ninguno."}, {"n": 18, "s": 2, "q": "¿Qué especificación ACL otorga al usuario 'alice' permisos de lectura y escritura?", "opts": ["g:alice:rw", "alice:u:rw", "u:alice:rw", "d:alice:rw"], "a": 2, "e": "El ejemplo del documento es u:alice:rw para dar lectura y escritura al usuario alice.", "code": "u:alice:rw"}, {"n": 19, "s": 2, "q": "¿Qué especificación ACL otorga al grupo 'devteam' permisos de lectura, escritura y ejecución?", "opts": ["g:devteam:rwx", "u:devteam:rwx", "o:devteam:rwx", "m:devteam:rwx"], "a": 0, "e": "El documento muestra g:devteam:rwx para dar lectura, escritura y ejecución al grupo devteam.", "code": "g:devteam:rwx"}, {"n": 20, "s": 2, "q": "¿Qué especificación ACL elimina todos los permisos del usuario 'bob'?", "opts": ["u:bob:000", "x:bob:rwx", "o:bob:---", "u:bob:---"], "a": 3, "e": "El ejemplo del documento es u:bob:--- para quitar todos los permisos al usuario bob.", "code": "u:bob:---"}, {"n": 21, "s": 2, "q": "¿Qué especificación establece una ACL predeterminada de solo lectura para el grupo 'auditors'?", "opts": ["d:g:auditors:r", "g:auditors:rwx", "d:u:auditors:r", "default:auditors"], "a": 0, "e": "El documento muestra d:g:auditors:r para una ACL predeterminada de solo lectura del grupo auditors.", "code": "d:g:auditors:r"}, {"n": 22, "s": 2, "q": "En un archivo de especificación ACL, ¿cómo se escribe una entrada de usuario en formato largo?", "opts": ["u:developer:rX", "usr:developer:rX", "user:developer:rX", "uid:developer:rX"], "a": 2, "e": "En el archivo acl_config.txt el documento usa el formato largo user:developer:rX.", "code": "user:developer:rX"}, {"n": 23, "s": 2, "q": "En el formato de archivo de especificación, ¿cómo se indica una ACL predeterminada para un grupo?", "opts": ["d:grp:group:webteam:rwX", "def:webteam:rwX:default", "default:group:webteam:rwX", "group:webteam:default:rwX"], "a": 2, "e": "En acl_config.txt el documento usa default:group:webteam:rwX en formato largo.", "code": "default:group:webteam:rwX"}, {"n": 24, "s": 2, "q": "¿Qué opción del comando setfacl aplica una especificación ACL leída desde un archivo?", "opts": ["setfacl -M acl_config.txt /srv/www/example.com", "setfacl -F acl_config.txt /srv/www/example.com", "setfacl --file acl_config.txt /srv/www/example.com", "setfacl -k acl_config.txt /srv/www/example.com"], "a": 0, "e": "El documento usa setfacl -M acl_config.txt para aplicar las ACL desde un archivo de especificación.", "code": "setfacl -M acl_config.txt /srv/www/example.com"}, {"n": 25, "s": 3, "q": "¿Qué hace la opción --modify (-m) de setfacl?", "opts": ["Elimina todas las ACL que tenga el archivo", "Agrega o modifica una entrada de la ACL", "Aplica el cambio de manera recursiva total", "Muestra la máscara efectiva del archivo"], "a": 1, "e": "--modify (-m) agrega o modifica una entrada de ACL."}, {"n": 26, "s": 3, "q": "¿Qué hace la opción --recursive (-R) de setfacl?", "opts": ["Restaura las ACL desde un archivo de backup", "Crea una ACL predeterminada en el directorio", "Aplica el cambio a archivos y subdirectorios", "Limita los permisos efectivos con la máscara"], "a": 2, "e": "--recursive (-R) aplica la operación a todos los archivos y subdirectorios."}, {"n": 27, "s": 3, "q": "En u:sftpdev:rX, ¿qué efecto tiene la X mayúscula sobre los archivos?", "opts": ["Otorga la ejecución a todos los archivos sin excepción", "Otorga ejecución solo si el archivo ya era ejecutable", "Quita por completo el permiso de ejecución a archivos", "Convierte los archivos del directorio en subdirectorios"], "a": 1, "e": "La X mayúscula otorga ejecución solo en archivos que ya tienen permiso de ejecución, a diferencia de x minúscula.", "code": "setfacl -m u:sftpdev:rX /srv/www/example.com"}, {"n": 28, "s": 3, "q": "¿Por qué usar X mayúscula en lugar de x minúscula al aplicar ACL recursivas?", "opts": ["Porque la x minúscula no es compatible con ext4", "Porque la X mayúscula también aplica la escritura", "Porque x minúscula haría ejecutable todo, un riesgo", "Porque solo la X mayúscula funciona con la opción -R"], "a": 2, "e": "Usar x minúscula haría todos los archivos ejecutables (riesgo de seguridad); X aplica ejecución solo donde corresponde."}, {"n": 29, "s": 3, "q": "¿Qué efecto tiene x minúscula sobre los directorios según la tabla del documento?", "opts": ["Permite introducir los permisos del directorio (atravesarlo)", "No produce ningún efecto sobre los directorios indicados", "Elimina el directorio del sistema si está totalmente vacío", "Marca el directorio como predeterminado para los hijos"], "a": 0, "e": "Según la tabla, x en directorios permite 'introducir los permisos del directorio' (entrar/atravesarlo)."}, {"n": 30, "s": 3, "q": "¿Qué prefijo se agrega a la especificación ACL para crear una ACL predeterminada?", "opts": ["def:", "d:", "x:", "r:"], "a": 1, "e": "El prefijo d: crea una ACL predeterminada que se aplica automáticamente a archivos y directorios recién creados.", "code": "setfacl -R -m d:u:sftpdev:rX /srv/www/example.com"}, {"n": 31, "s": 3, "q": "¿Qué problema soluciona configurar una ACL predeterminada (prefijo d:)?", "opts": ["Que los archivos existentes pierdan todos sus permisos", "Que la máscara limite los permisos efectivos máximos", "Que los archivos nuevos no hereden la ACL del dir", "Que el sistema de archivos no soporte las ACL del todo"], "a": 2, "e": "La ACL predeterminada soluciona que los archivos nuevos creados en el directorio no tengan ACL, haciéndolos heredar permisos."}, {"n": 32, "s": 3, "q": "¿Qué comando combina otorgar acceso de solo lectura a archivos existentes y futuros en una sola instrucción?", "opts": ["setfacl -R -m u:sftpdev:rX,d:u:sftpdev:rX /srv/www/example.com", "setfacl -R -b u:sftpdev:rX,d:u:sftpdev:rX /srv/www/example.com", "setfacl -k -m u:sftpdev:rX,d:u:sftpdev:rX /srv/www/example.com", "setfacl -R -x u:sftpdev:rX,d:u:sftpdev:rX /srv/www/example.com"], "a": 0, "e": "El comando combinado aplica la ACL actual y la predeterminada (d:) a la vez para archivos existentes y futuros.", "code": "setfacl -R -m u:sftpdev:rX,d:u:sftpdev:rX /srv/www/example.com"}, {"n": 33, "s": 3, "q": "¿Qué define la máscara ACL (mask)?", "opts": ["El propietario predeterminado de los archivos nuevos", "El sistema de archivos que es compatible con las ACL", "La cantidad máxima de usuarios dentro de una ACL", "Los permisos efectivos máximos, salvo del propietario"], "a": 3, "e": "La máscara define los permisos efectivos máximos para todas las entradas de la ACL, excepto la del propietario."}, {"n": 34, "s": 3, "q": "Si un usuario tiene ACL rwx pero la máscara está en r, ¿qué permiso efectivo obtiene?", "opts": ["rwx completo, la máscara no afecta usuarios", "Solo r, es decir, únicamente la lectura", "rw, es decir, lectura y escritura juntas", "Ninguno en absoluto, queda totalmente sin acceso"], "a": 1, "e": "Aunque al usuario se le otorgue rwx, la máscara en r limita el permiso efectivo a solo lectura."}, {"n": 35, "s": 3, "q": "¿Qué comando fija la máscara de acceso a solo lectura sobre un archivo sensible?", "opts": ["setfacl -m o::r /sensitive/file", "setfacl -b m::r /sensitive/file", "setfacl -m m::r /sensitive/file", "setfacl -k m::r /sensitive/file"], "a": 2, "e": "El documento usa setfacl -m m::r para establecer la máscara en solo lectura.", "code": "setfacl -m m::r /sensitive/file"}, {"n": 36, "s": 3, "q": "En la salida de getfacl, ¿qué indica la línea 'user:developer:rwx #effective:r--'?", "opts": ["Que developer es el propietario directo del archivo", "Que la ACL da rwx pero la máscara deja solo r--", "Que el archivo no tiene ninguna ACL extendida puesta", "Que developer perdió todos los permisos sobre el archivo"], "a": 1, "e": "La anotación #effective:r-- muestra que pese a tener rwx, la máscara limita el permiso efectivo a r--."}, {"n": 37, "s": 3, "q": "¿Qué especificación modifica la máscara ACL para fijar los permisos efectivos en lectura y ejecución?", "opts": ["m::rx", "u:mask:rx", "d:m:rx", "mask:rx"], "a": 0, "e": "El ejemplo del documento es m::rx para modificar la máscara (límite de permisos efectivos).", "code": "m::rx"}, {"n": 38, "s": 4, "q": "¿Qué opción de setfacl elimina una entrada de ACL específica de un usuario?", "opts": ["setfacl -b u:developer /var/www/project", "setfacl -k u:developer /var/www/project", "setfacl -m u:developer /var/www/project", "setfacl -x u:developer /var/www/project"], "a": 3, "e": "La opción -x elimina una entrada de ACL específica.", "code": "setfacl -x u:developer /var/www/project"}, {"n": 39, "s": 4, "q": "¿Qué opción elimina TODAS las ACL y restaura los permisos estándar?", "opts": ["setfacl -b /var/www/project", "setfacl -k /var/www/project", "setfacl -x /var/www/project", "setfacl -d /var/www/project"], "a": 0, "e": "La opción -b elimina todas las ACL y restaura los permisos estándar.", "code": "setfacl -b /var/www/project"}, {"n": 40, "s": 4, "q": "¿Qué opción elimina únicamente las ACL predeterminadas?", "opts": ["setfacl -b /var/www/project", "setfacl -x /var/www/project", "setfacl -k /var/www/project", "setfacl -m /var/www/project"], "a": 2, "e": "La opción -k elimina solo las ACL predeterminadas.", "code": "setfacl -k /var/www/project"}, {"n": 41, "s": 4, "q": "¿Qué comando elimina todas las ACL de forma recursiva en un directorio?", "opts": ["setfacl -k -R /var/www/project", "setfacl -R -b /var/www/project", "setfacl -R -x /var/www/project", "setfacl -m -R /var/www/project"], "a": 1, "e": "El documento combina -R con -b para eliminar todas las ACL recursivamente.", "code": "setfacl -R -b /var/www/project"}, {"n": 42, "s": 4, "q": "¿Cómo se copian las ACL de un archivo a otro usando getfacl y setfacl?", "opts": ["getfacl source_file | setfacl --set-file=- target_file", "cp --acl --preserve source_file target_file -recursive", "setfacl --copy-from source_file --to target_file -R -v", "getfacl source_file > setfacl --apply target_file --acl"], "a": 0, "e": "El documento canaliza getfacl source_file hacia setfacl --set-file=- target_file para copiar las ACL.", "code": "getfacl source_file | setfacl --set-file=- target_file"}, {"n": 43, "s": 4, "q": "¿Qué comando realiza un respaldo recursivo de las ACL de un directorio a un archivo de texto?", "opts": ["setfacl -R /source/dir > acl_backup.txt", "getfacl -R /source/dir > acl_backup.txt", "getfacl -b /source/dir > acl_backup.txt", "setfacl -R /source/dir < acl_backup.txt"], "a": 1, "e": "El documento usa getfacl -R redirigido a un archivo para respaldar las ACL recursivamente.", "code": "getfacl -R /source/dir > acl_backup.txt"}, {"n": 44, "s": 4, "q": "¿Qué opción de setfacl restaura las ACL desde un archivo de respaldo?", "opts": ["setfacl -M=acl_backup.txt", "setfacl -b acl_backup.txt", "setfacl --restore=acl_backup.txt", "setfacl --set-file=acl_backup.txt"], "a": 2, "e": "El documento usa setfacl --restore=acl_backup.txt para restaurar las ACL desde un respaldo.", "code": "setfacl --restore=acl_backup.txt"}, {"n": 45, "s": 4, "q": "En la salida de getfacl, ¿qué representa la línea 'user::rwx'?", "opts": ["Los permisos del propietario del archivo", "Una ACL para un usuario sin nombre", "Los permisos efectivos máximos posibles", "Los permisos para todos los demás usuarios"], "a": 0, "e": "La entrada user:: (sin nombre) representa los permisos del propietario del archivo."}, {"n": 46, "s": 4, "q": "En la salida de getfacl, ¿qué representan las líneas con prefijo 'default:'?", "opts": ["Los permisos actuales del propietario del archivo", "La máscara que fija el efectivo del archivo", "Los permisos que se eliminarán al reiniciar", "Las heredadas por nuevos archivos y directorios"], "a": 3, "e": "Las entradas default: son las ACL predeterminadas heredadas por nuevos archivos/directorios."}, {"n": 47, "s": 4, "q": "En la salida de getfacl, ¿qué representa la línea 'other::---'?", "opts": ["Los permisos del grupo propietario", "La máscara efectiva del archivo", "Los permisos para todos los demás", "Una entrada de usuario adicional"], "a": 2, "e": "La entrada other:: representa los permisos para todos los demás (otros)."}, {"n": 48, "s": 5, "q": "En el caso del equipo de desarrollo, ¿qué nivel de acceso se otorga al equipo de QA?", "opts": ["Acceso completo de lectura y escritura", "Sin ningún acceso al directorio", "Acceso solo a los logs del sistema", "Acceso de solo lectura, con rX"], "a": 3, "e": "El documento otorga al equipo de QA acceso de solo lectura con g:qa:rX,d:g:qa:rX.", "code": "setfacl -R -m g:qa:rX,d:g:qa:rX $WEB_ROOT"}, {"n": 49, "s": 5, "q": "En la protección de archivos de configuración, ¿qué permiso recibe el usuario www-data sobre config.yml?", "opts": ["Lectura y escritura, ambos (rw)", "Solo el permiso de lectura (r)", "Lectura, escritura y ejecución (rwx)", "Ningún permiso en absoluto (---)"], "a": 1, "e": "El documento otorga a www-data solo lectura (r) para que pueda leer la configuración sin escribir.", "code": "setfacl -m u:www-data:r /etc/myapp/config.yml"}, {"n": 50, "s": 5, "q": "En el directorio de carga compartida, ¿qué se combina con la ACL para que solo el admin pueda eliminar archivos?", "opts": ["El sticky bit del directorio (chmod +t)", "La opción -k aplicada con setfacl", "Una máscara configurada en modo ---", "El prefijo d: puesto en cada entrada"], "a": 0, "e": "El documento combina el sticky bit (chmod +t) con la ACL para que solo el admin pueda eliminar archivos.", "code": "chmod +t $UPLOAD_DIR"}, {"n": 51, "s": 5, "q": "En el flujo de trabajo de Git, ¿con qué shell se crea el usuario sftpdev?", "opts": ["/bin/bash", "/sbin/nologin", "/bin/sh", "/usr/bin/zsh"], "a": 1, "e": "El usuario SFTP se crea con shell /sbin/nologin: useradd -m -s /sbin/nologin sftpdev.", "code": "useradd -m -s /sbin/nologin sftpdev"}, {"n": 52, "s": 5, "q": "Tras dar acceso rX al usuario sftpdev, ¿qué ocurre al ejecutar 'touch' como ese usuario?", "opts": ["Crea el archivo de forma correcta", "Crea el archivo pero sin permisos", "Falla con 'Permission denied'", "Elimina el directorio de destino"], "a": 2, "e": "Como sftpdev tiene solo lectura/ejecución, el touch falla con 'Permission denied'.", "code": "sudo -u sftpdev touch /srv/www/production.example.com/test"}, {"n": 53, "s": 5, "q": "El error 'Operación no compatible' suele indicar que...", "opts": ["El sistema de archivos no tiene activo el soporte ACL", "El usuario indicado no existe dentro del sistema", "La máscara configurada es demasiado restrictiva", "Falta el prefijo d: dentro de la especificación"], "a": 0, "e": "Ese error suele significar que el sistema de archivos no tiene habilitado el soporte para ACL."}, {"n": 54, "s": 5, "q": "¿Qué comando vuelve a montar /srv con soporte de ACL para corregir el error de soporte?", "opts": ["setfacl -b /srv", "mount --acl /srv", "sudo mount -o remount,acl /srv", "fstab -o acl /srv"], "a": 2, "e": "El documento usa sudo mount -o remount,acl /srv para remontar con soporte ACL.", "code": "sudo mount -o remount,acl /srv"}, {"n": 55, "s": 5, "q": "Si las ACL no se heredan en archivos nuevos, ¿qué olvidó configurar el administrador?", "opts": ["El sticky bit del directorio", "La máscara que fija lo efectivo", "El sistema de archivos tipo XFS", "Las ACL predeterminadas (d:)"], "a": 3, "e": "El problema de no heredar ACL en archivos nuevos se debe a olvidar configurar las ACL predeterminadas con el prefijo d:.", "code": "setfacl -m d:u:developer:rX /var/www"}, {"n": 56, "s": 5, "q": "Estándar cp y rsync, por defecto, ¿qué ocurre con las ACL?", "opts": ["Las conservan siempre de modo automático", "Las convierten en permisos de tipo chmod", "Las eliminan del archivo de origen siempre", "No las conservan de forma predeterminada"], "a": 3, "e": "El documento aclara que cp y rsync estándar no conservan las ACL por defecto."}, {"n": 57, "s": 5, "q": "¿Qué flag de rsync preserva las ACL al copiar?", "opts": ["El flag -A", "El flag -z", "El flag -P", "El flag -b"], "a": 0, "e": "El documento indica que el flag -A de rsync preserva las ACL.", "code": "rsync -avA source/ dest/"}, {"n": 58, "s": 5, "q": "¿Qué comando de cp preserva las ACL según el documento?", "opts": ["cp -R source dest", "cp --acl source dest", "cp -a --preserve=all source dest", "cp -f source dest"], "a": 2, "e": "El documento usa cp -a --preserve=all para conservar las ACL al copiar.", "code": "cp -a --preserve=all source dest"}, {"n": 59, "s": 5, "q": "Según las buenas prácticas, ¿en qué consiste el principio del mínimo privilegio?", "opts": ["Otorgar rwx a todos y luego restringir lo justo", "Comenzar sin permisos y agregar lo necesario", "Usar siempre la máscara configurada en modo rwx", "Asignar permisos por usuario en lugar de grupos"], "a": 1, "e": "El principio del mínimo privilegio consiste en comenzar sin permisos y agregar únicamente lo que sea necesario."}, {"n": 60, "s": 5, "q": "¿Por qué recomienda el documento usar grupos siempre que sea posible en las ACL?", "opts": ["Porque los grupos no requieren un FS con soporte ACL", "Porque ocupan bastante menos espacio dentro del disco", "Porque son más fáciles de administrar que por usuario", "Porque solo los grupos admiten las ACL predeterminadas"], "a": 2, "e": "El documento recomienda usar grupos porque son más fáciles de administrar que las ACL de usuarios individuales."}, {"n": 61, "s": 5, "q": "¿Las ACL anulan o reemplazan a los permisos estándar de Unix?", "opts": ["Sí, las ACL siempre tienen la prioridad total", "No, las ACL solo van si chmod está deshabilitado", "Sí, pero únicamente cuando son directorios", "No, conviven y prevalece el más restrictivo"], "a": 3, "e": "Las ACL funcionan junto con los permisos estándar; cuando se evalúan ambos prevalece el permiso más restrictivo."}, {"n": 62, "s": 5, "q": "¿Las ACL sobreviven a un reinicio del sistema?", "opts": ["Sí, se guardan en metadatos del sistema de archivos", "No, deben volver a aplicarse en cada nuevo arranque", "Solo si previamente se guardan dentro de /etc/fstab", "Solo en los sistemas de archivos de tipo XFS"], "a": 0, "e": "Las ACL se almacenan en los metadatos del sistema de archivos y se conservan tras reiniciar."}, {"n": 63, "s": 5, "q": "¿A qué nivel de control de acceso operan las ACL respecto de SELinux/AppArmor?", "opts": ["Control de acceso obligatorio (MAC)", "Control de acceso discrecional (DAC)", "Control de acceso basado en roles (RBAC)", "Control de acceso físico de equipos (PAC)"], "a": 1, "e": "Las ACL operan a nivel de control de acceso discrecional (DAC), mientras SELinux/AppArmor proveen MAC."}, {"n": 64, "s": 5, "q": "¿Cómo se identifica visualmente que un archivo tiene ACL en la salida de 'ls -l'?", "opts": ["Aparece una letra 'a' al inicio de la línea", "Aparece la palabra 'acl' junto al tamaño", "El nombre del archivo se ve en otro color", "Aparece un signo + al final de los permisos"], "a": 3, "e": "Los archivos con ACL muestran un signo + al final de la cadena de permisos en ls -l."}];
const THRESH = {};
let answers={}, instantMode=false, displayList=[...QUESTIONS], onlyWrongView=false, graded=false;
function letter(i){return["a","b","c","d","e"][i];}
function renderFilter(){
  const sel=document.getElementById("filter");
  Object.entries(SECTIONS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v;sel.appendChild(o);});
  sel.addEventListener("change",render);
}
function render(){
  const quiz=document.getElementById("quiz"); quiz.innerHTML="";
  const filter=document.getElementById("filter").value;
  let currentSection=null;
  let toShow=displayList.filter(q=>filter==="all"||String(q.s)===filter);
  if(onlyWrongView&&graded) toShow=toShow.filter(q=>answers[q.n]!==undefined&&answers[q.n]!==q.a);
  toShow.forEach(qd=>{
    if(qd.s!==currentSection&&filter==="all"){
      const div=document.createElement("div"); div.className="section-divider"; div.textContent=SECTIONS[qd.s]; quiz.appendChild(div); currentSection=qd.s;
    }
    const card=document.createElement("div"); card.className="question"; card.id="q"+qd.n;
    const h3=document.createElement("h3");
    const status=answers[qd.n]===undefined?'<span class="badge badge-pending">Sin responder</span>':(graded||instantMode)?(answers[qd.n]===qd.a?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>'):'<span class="badge badge-pending">Respondida</span>';
    h3.innerHTML=`Pregunta ${qd.n} ${status}`; card.appendChild(h3);
    const prompt=document.createElement("div"); prompt.className="prompt"; prompt.textContent=qd.q; card.appendChild(prompt);
    if(qd.code){const pre=document.createElement("pre");pre.textContent=qd.code;card.appendChild(pre);}
    const opts=document.createElement("div"); opts.className="options";
    qd.opts.forEach((txt,idx)=>{
      const lbl=document.createElement("label"); lbl.className="opt";
      const radio=document.createElement("input"); radio.type="radio"; radio.name="q"+qd.n; radio.value=idx;
      if(answers[qd.n]===idx) radio.checked=true;
      radio.addEventListener("change",()=>{answers[qd.n]=idx; if(instantMode)showFeedback(qd.n); updateStats(); renderItemMarks(qd);});
      const letterSpan=document.createElement("span"); letterSpan.className="letter"; letterSpan.textContent=letter(idx)+")";
      const text=document.createElement("span"); text.textContent=txt;
      lbl.appendChild(radio); lbl.appendChild(letterSpan); lbl.appendChild(text); opts.appendChild(lbl);
    });
    card.appendChild(opts);
    const fb=document.createElement("div"); fb.className="feedback"; fb.id="fb"+qd.n; card.appendChild(fb);
    quiz.appendChild(card);
    if(graded||(instantMode&&answers[qd.n]!==undefined)){renderItemMarks(qd); if(answers[qd.n]!==undefined)showFeedback(qd.n);}
  });
  if(toShow.length===0) quiz.innerHTML='<div class="question" style="text-align:center;color:var(--muted)">No hay preguntas para mostrar.</div>';
  updateStats();
}
function renderItemMarks(qd){
  if(!graded&&!instantMode) return; if(answers[qd.n]===undefined) return;
  const card=document.getElementById("q"+qd.n); if(!card) return;
  card.querySelectorAll(".opt").forEach((lbl,idx)=>{lbl.classList.remove("correct","incorrect"); if(idx===qd.a)lbl.classList.add("correct"); else if(idx===answers[qd.n])lbl.classList.add("incorrect");});
  const h3=card.querySelector("h3"); const isOk=answers[qd.n]===qd.a;
  h3.innerHTML=`Pregunta ${qd.n} `+(isOk?'<span class="badge badge-ok">Correcta</span>':'<span class="badge badge-err">Incorrecta</span>');
}
function showFeedback(n){
  const qd=QUESTIONS.find(q=>q.n===n); const fb=document.getElementById("fb"+n); if(!fb) return;
  const isOk=answers[n]===qd.a;
  fb.className="feedback show "+(isOk?"ok":"err");
  fb.innerHTML=isOk?`✅ <b>Correcto.</b> ${qd.e}`:`❌ <b>Incorrecto.</b> Respuesta: <b>${letter(qd.a)})</b> ${qd.opts[qd.a]}. ${qd.e}`;
}
function updateStats(){
  const answered=Object.keys(answers).length;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  document.getElementById("answered").textContent=answered;
  document.getElementById("correct").textContent=correct;
  document.getElementById("wrong").textContent=answered-correct;
  document.getElementById("progress").style.width=(answered/QUESTIONS.length*100)+"%";
}
function grade(){
  graded=true;
  const correct=Object.entries(answers).filter(([n,a])=>{const q=QUESTIONS.find(x=>x.n===Number(n));return q&&q.a===a;}).length;
  const total=QUESTIONS.length; const pct=Math.round(correct/total*100);
  let level,cls;
  if(pct>=90){level="Excelente. Dominás el tema. 🚀";cls="level-elite";}
  else if(pct>=75){level="Bien. Repasá los que fallaste. 💪";cls="level-good";}
  else if(pct>=55){level="Justo. Repasá las secciones débiles. 📚";cls="level-mid";}
  else{level="Volvé a estudiar el material. 🔥";cls="level-bad";}
  const bySection={};
  Object.keys(SECTIONS).forEach(s=>bySection[s]={ok:0,total:0});
  QUESTIONS.forEach(q=>{bySection[q.s].total++;if(answers[q.n]===q.a)bySection[q.s].ok++;});
  const secHtml=Object.entries(SECTIONS).map(([k,v])=>{const sd=bySection[k];const sPct=sd.total?Math.round(sd.ok/sd.total*100):0;return`<div class="sec-card"><div class="sec-name">${v}</div><div class="sec-score">${sd.ok}/${sd.total} <span style="color:var(--muted);font-size:13px;font-weight:normal">(${sPct}%)</span></div></div>`;}).join("");
  const res=document.getElementById("result"); res.classList.add("show");
  res.innerHTML=`<h2>📊 Resultado</h2><div class="score-big">${correct} / ${total} <span style="font-size:24px;color:var(--muted)">(${pct}%)</span></div><div class="score-level ${cls}">${level}</div><div class="by-section">${secHtml}</div><div style="margin-top:14px;color:var(--muted);font-size:14px">Las correctas en verde, las erradas en rojo, con explicación.</div>`;
  res.scrollIntoView({behavior:"smooth"}); render();
}
function reset(){
  if(!confirm("¿Reiniciar el test? Vas a perder las respuestas.")) return;
  answers={}; graded=false; onlyWrongView=false;
  document.getElementById("result").classList.remove("show");
  displayList=[...QUESTIONS]; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function shuffle(){
  if(graded){if(!confirm("Esto va a reiniciar tus respuestas. ¿Continuar?"))return;answers={};graded=false;}
  for(let i=displayList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[displayList[i],displayList[j]]=[displayList[j],displayList[i]];}
  render();
}
document.getElementById("btnSubmit").addEventListener("click",grade);
document.getElementById("btnReset").addEventListener("click",reset);
document.getElementById("btnShuffle").addEventListener("click",shuffle);
document.getElementById("btnInstant").addEventListener("click",()=>{instantMode=!instantMode;document.getElementById("instantState").textContent=instantMode?"ON":"OFF";render();});
document.getElementById("btnOnlyWrong").addEventListener("click",()=>{if(!graded){alert("Primero calificá el test.");return;}onlyWrongView=true;render();});
document.getElementById("btnAll").addEventListener("click",()=>{onlyWrongView=false;render();});
document.getElementById("total").textContent=QUESTIONS.length;
renderFilter(); render();
</script>
